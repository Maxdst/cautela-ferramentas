<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Cautelix — Controle de Ferramentas</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1A2535">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cautela GPS">
<link rel="apple-touch-icon" href="/icon-192.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
:root{--primary:#1A2535;--primary-light:#2E3F55;--primary-accent:#4A90A4;--silver:#8A9BB0;--silver-light:#C4CDD8;--accent:#A07C4E;--accent-dark:#8B6B3D;--success:#2E7D6B;--danger:#7A2E2E;--warning:#B8860B;--notif:#B23A2C;--bg:#E8ECF0;--card:#F6F8FA;--border:#C4CDD8;--text:#0F1820;--text-secondary:#566475;--sidebar-w:240px;--bottom-nav-h:60px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
#root{display:flex;flex-direction:column;min-height:100vh}
.login-page{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,var(--primary) 0%,#0F1820 100%)}
.login-box{background:white;border-radius:16px;padding:48px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo .brand-mark{width:56px;height:56px;border-radius:15px;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;background:linear-gradient(140deg,var(--primary-accent),var(--primary));box-shadow:0 8px 20px rgba(26,37,53,.32)}
.login-logo h1{color:var(--primary);font-size:1.5rem;font-weight:700}
.layout{display:flex;min-height:100vh}
.sidebar{width:var(--sidebar-w);background:var(--primary);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:50;transition:transform .3s}
.sidebar-header{padding:20px 16px;border-bottom:1px solid rgba(255,255,255,.1)}
.sidebar-logo{display:flex;align-items:center;gap:10px;color:white}
.sidebar-logo .icon{font-size:1.6rem}
.sidebar-logo h2{font-size:1rem;font-weight:700;line-height:1.2}
.sidebar-logo p{font-size:.72rem;opacity:.7}
.sidebar-user{padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.1)}
.sidebar-user .name{color:white;font-size:.88rem;font-weight:600}
.sidebar-user .role{font-size:.75rem;color:var(--accent);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}
.nav-item{display:flex;align-items:center;gap:10px;padding:11px 16px;color:rgba(255,255,255,.7);cursor:pointer;transition:all .15s;font-size:.9rem;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:rgba(255,255,255,.1);color:white}
.nav-item.active{background:rgba(74,144,164,.15);color:var(--primary-accent);border-right:3px solid var(--primary-accent)}
.nav-item .nav-icon{width:24px;display:inline-flex;align-items:center;justify-content:center}
.nav-badge{background:var(--notif);color:white;border-radius:10px;font-size:.65rem;font-weight:800;padding:2px 6px;margin-left:auto;box-shadow:0 0 0 2px rgba(178,58,44,.25)}
.sidebar-footer{padding:12px 16px;border-top:1px solid rgba(255,255,255,.1)}
.btn-logout{display:flex;align-items:center;gap:8px;color:rgba(255,255,255,.6);background:none;border:none;cursor:pointer;font-size:.85rem;width:100%;padding:8px}
.btn-logout:hover{color:white}
.main-content{margin-left:var(--sidebar-w);flex:1;padding:28px;min-height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:10px}
.topbar h2{font-size:1.25rem;font-weight:700;color:var(--text)}
.topbar-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--card);border-radius:12px;padding:20px;border:1px solid var(--border);position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;right:0;width:4px;height:100%;background:var(--accent)}
.stat-card.blue::before{background:var(--primary)}
.stat-card.green::before{background:var(--success)}
.stat-card.red::before{background:var(--danger)}
.stat-label{font-size:.75rem;color:var(--text-secondary);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.stat-value{font-size:1.9rem;font-weight:800;margin-top:4px;line-height:1;font-variant-numeric:tabular-nums}
.stat-value.money{font-size:clamp(1.25rem,3.2vw,1.6rem);letter-spacing:-.01em}
.stat-card.blue .stat-value{color:var(--primary)}
.stat-card.green .stat-value{color:var(--success)}
.stat-card.red .stat-value{color:var(--danger)}
.stat-card .stat-value{color:var(--accent)}
.stat-section{margin-bottom:22px}
.stat-section-title{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-secondary);margin:0 0 10px;display:flex;align-items:center;gap:10px}
.stat-section-title .st-ic{color:var(--primary-accent);display:inline-flex}
.stat-section-title::after{content:'';flex:1;height:1px;background:var(--border)}
.stat-section .stats-grid{margin-bottom:0}
.card{background:var(--card);border-radius:12px;border:1px solid var(--border);margin-bottom:20px}
.card-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.card-title{font-size:.95rem;font-weight:600;color:var(--text)}
.card-body{padding:20px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:8px;font-size:.875rem;font-weight:600;cursor:pointer;border:none;transition:all .15s;text-decoration:none;white-space:nowrap}
.btn-primary{background:var(--primary-accent);color:white}.btn-primary:hover{background:#3d7a8e}
.btn-accent{background:var(--accent);color:white}.btn-accent:hover{background:var(--accent-dark)}
.btn-success{background:var(--success);color:white}.btn-success:hover{background:#256257}
.btn-danger{background:var(--danger);color:white}.btn-danger:hover{background:#b91c1c}
.btn-outline{background:var(--card);color:var(--primary);border:1.5px solid var(--primary-accent)}.btn-outline:hover{background:var(--bg)}
.btn-ghost{background:none;color:var(--text-secondary);border:1px solid var(--border)}.btn-ghost:hover{background:var(--bg)}
.btn-sm{padding:7px 12px;font-size:.8rem;min-height:34px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group.full{grid-column:1/-1}
label{font-size:.8rem;font-weight:600;color:var(--text-secondary)}
input,select,textarea{padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:.9rem;font-family:inherit;color:var(--text);background:white;transition:border-color .15s;width:100%}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--primary)}
textarea{resize:vertical;min-height:70px}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.88rem}
th{text-align:left;padding:10px 14px;font-size:.75rem;text-transform:uppercase;letter-spacing:.05em;color:var(--text-secondary);border-bottom:2px solid var(--border);font-weight:700;background:#EEF1F5;white-space:nowrap}
td{padding:12px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#E4E9EF}
td .actions{display:flex;gap:6px;flex-wrap:wrap}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.75rem;font-weight:700;white-space:nowrap}
.badge-ativa,.badge-ativo,.badge-retirada{background:#d1fae5;color:#065f46}
.badge-devolvida,.badge-devolvido,.badge-cancelada,.badge-recusado{background:#f3f4f6;color:#6b7280}
.badge-aguardando_retirada,.badge-aguardando_tomador,.badge-aguardando_lider,.badge-pronta{background:#fef3c7;color:#92400e}
.badge-solicitada{background:#dbeafe;color:#1e40af}
.badge-separando{background:#f0fdf4;color:#166534}
.badge-lider{background:#dbeafe;color:#1e40af}
.badge-operario{background:#f0fdf4;color:#166534}
.badge-almoxarifado{background:#fdf4ff;color:#7e22ce}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:white;border-radius:14px;width:100%;box-shadow:0 25px 60px rgba(0,0,0,.3);max-height:90vh;display:flex;flex-direction:column}
.modal-sm{max-width:460px}.modal-md{max-width:620px}.modal-lg{max-width:820px}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-header h3{font-size:1.05rem;font-weight:700}
.modal-close{background:none;border:none;cursor:pointer;font-size:1.5rem;color:var(--text-secondary);line-height:1;width:38px;height:38px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;transition:background .15s,color .15s;margin:-6px -10px -6px 0}
.modal-close:hover{background:var(--bg);color:var(--text)}
.modal-body{padding:24px;overflow-y:auto;flex:1}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;flex-shrink:0;flex-wrap:wrap}
/* Lista compacta de ferramentas */
.tool-list{border-top:1px solid var(--border)}
.tool-item{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 20px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;background:none;border-left:0;border-right:0;border-top:0;width:100%;text-align:left;font-family:inherit;color:var(--text)}
.tool-item:hover{background:var(--bg)}
.tool-item .ti-nome{font-weight:600;font-size:.92rem;display:flex;align-items:center;gap:8px;min-width:0}
.tool-item .ti-nome span.nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tool-item .ti-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.qtd-badge{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:3px 11px;font-weight:700;font-size:.85rem;font-variant-numeric:tabular-nums;min-width:40px;text-align:center;color:var(--text)}
.tool-item .ti-chevron{color:var(--silver);display:inline-flex;transition:transform .2s}
.tool-item.open{background:var(--bg)}
.tool-item.open .ti-chevron{transform:rotate(90deg);color:var(--primary-accent)}
/* Painel de edição embutido (acordeão) — abre entre os itens da lista */
.tool-edit-panel{background:var(--bg);border-bottom:1px solid var(--border);padding:16px 20px 18px;animation:tepDown .18s ease}
@keyframes tepDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.tep-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px}
.tep-title{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text-secondary)}
.tep-close{background:none;border:none;cursor:pointer;color:var(--text-secondary);display:inline-flex;padding:5px;border-radius:6px}
.tep-close:hover{background:var(--border);color:var(--text)}
.tep-footer{display:flex;gap:10px;justify-content:space-between;align-items:center;margin-top:16px;flex-wrap:wrap}
.sig-wrap{border:2px dashed var(--border);border-radius:10px;padding:12px;background:var(--card);text-align:center}
.sig-wrap p{font-size:.8rem;color:var(--text-secondary);margin-bottom:8px}
.sig-canvas{display:block;margin:0 auto;border:1px solid var(--border);border-radius:8px;cursor:crosshair;background:white;touch-action:none;max-width:100%;height:auto}
.sig-actions{margin-top:8px;display:flex;gap:8px;justify-content:center}
.sig-preview{max-width:100%;border-radius:6px;border:1px solid var(--border)}
.alert{padding:12px 16px;border-radius:8px;font-size:.88rem;font-weight:500;margin-bottom:16px;border-left:4px solid}
.alert-success{background:#d1fae5;color:#065f46;border-color:var(--success)}
.alert-error{background:#fee2e2;color:#991b1b;border-color:var(--danger)}
.alert-warning{background:#fef3c7;color:#92400e;border-color:var(--warning)}
.alert-info{background:rgba(74,144,164,.12);color:#1F4B57;border-color:var(--primary-accent)}
.empty{text-align:center;padding:44px 24px;color:var(--text-secondary);display:flex;flex-direction:column;align-items:center;gap:8px}
.empty .empty-icon{color:var(--silver);margin-bottom:4px}
.empty p{margin:0;font-size:.92rem}
.empty-cta{margin-top:8px}
.pending-banner{background:linear-gradient(135deg,#fef3c7,#fde68a);border:1px solid var(--accent);border-radius:12px;padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.pending-banner .msg{font-size:.95rem;font-weight:600;color:#92400e}
.items-list{border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-top:8px}
.item-row{display:grid;grid-template-columns:1fr 70px 90px auto;gap:8px;align-items:center;padding:8px 12px;border-bottom:1px solid var(--border)}
.item-row:last-child{border-bottom:none}
.item-row:nth-child(even){background:#E4E9EF}
.toast-container{position:fixed;bottom:24px;right:24px;z-index:999;display:flex;flex-direction:column;gap:8px}
.toast{background:#1f2937;color:white;padding:12px 18px;border-radius:10px;font-size:.875rem;box-shadow:0 4px 20px rgba(0,0,0,.3);animation:slideIn .2s ease;display:flex;align-items:center;gap:8px;min-width:260px;max-width:360px}
.toast.success{border-left:4px solid var(--success)}
.toast.error{border-left:4px solid var(--danger)}
.toast.warning{border-left:4px solid var(--warning)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.divider{border:none;border-top:1px solid var(--border);margin:16px 0}
.text-muted{color:var(--text-secondary);font-size:.85rem}
.fw-bold{font-weight:700}
.mt-4{margin-top:16px}
.gap-8{display:flex;gap:8px;flex-wrap:wrap}
.items-center{display:flex;align-items:center;gap:8px}
/* Kanban delivery */
.kanban{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;margin-bottom:20px}
.kanban-col{background:var(--bg);border-radius:10px;padding:12px}
.kanban-col h4{font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text-secondary);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.kanban-count{background:var(--primary);color:white;border-radius:10px;padding:2px 8px;font-size:.7rem}
.kanban-card{background:white;border-radius:8px;padding:12px;margin-bottom:8px;border:1px solid var(--border);box-shadow:0 1px 4px rgba(0,0,0,.06)}
.kanban-card .kc-numero{font-weight:700;font-size:.9rem;color:var(--primary)}
.kanban-card .kc-lider{font-size:.82rem;color:var(--text-secondary);margin-top:2px}
.kanban-card .kc-valor{font-size:.82rem;color:var(--success);font-weight:600;margin-top:4px}
.kanban-card .kc-actions{margin-top:8px;display:flex;gap:6px;flex-wrap:wrap}
/* Auth device box */
.auth-device-box{background:#EEF3F7;border:2px solid var(--silver-light);border-radius:10px;padding:20px;margin-bottom:16px}
.auth-device-box h4{color:var(--primary-accent);font-size:.95rem;margin-bottom:12px;font-weight:700}
/* Bottom nav */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:var(--bottom-nav-h);background:var(--primary);z-index:100;border-top:2px solid rgba(255,255,255,.1)}
.bottom-nav-inner{display:flex;height:100%}
.bottom-nav-btn{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:none;border:none;color:rgba(255,255,255,.6);cursor:pointer;font-size:.6rem;font-weight:600;text-transform:uppercase;letter-spacing:.02em;padding:4px 2px;transition:all .15s;position:relative}
.bottom-nav-btn .bn-label{max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block}
.bottom-nav-btn .bn-icon{display:flex;align-items:center;justify-content:center;line-height:1}
.bottom-nav-btn.active{color:var(--accent)}
.bn-badge{position:absolute;top:6px;right:8px;background:var(--notif);color:white;border-radius:8px;font-size:.6rem;font-weight:800;padding:1px 5px;min-width:14px;text-align:center;box-shadow:0 0 0 2px var(--primary)}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0);box-shadow:4px 0 20px rgba(0,0,0,.4)}
  .main-content{margin-left:0;padding:12px 14px;padding-bottom:calc(var(--bottom-nav-h) + 12px)}
  .form-grid{grid-template-columns:1fr}
  .bottom-nav{display:block}
  .topbar{margin-bottom:16px}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  table{font-size:.82rem}th,td{padding:8px 10px}
  .modal{margin:0 8px}
  .kanban{grid-template-columns:1fr}
  /* Tabela -> cartoes empilhados (uso em campo, celular) */
  table.cards-mobile,table.cards-mobile tbody{display:block}
  table.cards-mobile thead{display:none}
  table.cards-mobile tr{display:block;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:4px 2px;margin-bottom:12px}
  table.cards-mobile tr:hover td{background:none}
  table.cards-mobile td{display:flex;justify-content:space-between;align-items:baseline;gap:14px;border:none;border-bottom:1px solid var(--border);padding:9px 14px;text-align:right}
  table.cards-mobile td:last-child{border-bottom:none}
  table.cards-mobile td::before{content:attr(data-label);font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--text-secondary);text-align:left;white-space:nowrap;flex-shrink:0}
  table.cards-mobile td.cell-actions{display:block;text-align:left;padding-top:12px}
  table.cards-mobile td.cell-actions::before{display:none}
  table.cards-mobile td.cell-actions .actions .btn{flex:1;justify-content:center}
  table.cards-mobile td[colspan]{display:block;text-align:center}
  table.cards-mobile td[colspan]::before{display:none}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React

const token = { value: localStorage.getItem('cf_token') }

async function api(method, path, body) {
  const res = await fetch('/api' + path, {
    method,
    headers: { 'Content-Type': 'application/json', ...(token.value ? { Authorization: `Bearer ${token.value}` } : {}) },
    ...(body !== undefined ? { body: JSON.stringify(body) } : {})
  })
  const data = await res.json().catch(() => ({}))
  if (!res.ok) throw new Error(data.error || `Erro ${res.status}`)
  return data
}
const GET = p => api('GET', p)
const POST = (p, b) => api('POST', p, b)
const PUT = (p, b) => api('PUT', p, b)
const DEL = p => api('DELETE', p)

// Nome (e logo opcional) da empresa buscados uma vez do backend (evita texto fixo em termos/avisos legais)
// nome = nome de exibição curto (UI: login, sidebar) | razaoSocial = nome legal completo (declarações formais)
const empresaInfo = { nome: 'sua empresa', razaoSocial: 'sua empresa', logoUrl: null }

function fmt(d) {
  if (!d) return '—'
  const [y,m,dd] = d.split('T')[0].split('-')
  return `${dd}/${m}/${y}`
}
function fmtDT(d) {
  if (!d) return '—'
  return d.replace('T', ' ').slice(0, 16)
}
function today() { return new Date().toISOString().slice(0, 10) }
function fmtBRL(v) {
  if (!v) return 'R$ 0,00'
  return 'R$ ' + Number(v).toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d))/g, '.')
}

const STATUS_LABEL = {
  solicitada: 'Solicitada', separando: 'Separando', pronta: 'Pronto p/ retirada',
  retirada: 'Retirada', cancelada: 'Cancelada',
  aguardando_retirada: 'Aguard. retirada', ativa: 'Ativa', devolvida: 'Devolvida',
  aguardando_tomador: 'Aguard. confirmação', aguardando_lider: 'Aguard. líder',
  ativo: 'Ativo', devolvido: 'Devolvido', recusado: 'Recusado'
}
const ROLE_LABEL = { almoxarifado: 'Almoxarifado', lider: 'Líder', operario: 'Operário' }

// ─── SIGNATURE PAD ────────────────────────────────────────────────────────────
function SignaturePad({ label, onConfirm, onCancel }) {
  const ref = useRef(null)
  const drawing = useRef(false)
  const [hasSig, setHasSig] = useState(false)
  const [semAssinatura, setSemAssinatura] = useState(false)
  // Escala a posição do ponteiro pela razão entre a resolução interna do canvas e o tamanho
  // renderizado em CSS — sem isso, num celular onde o canvas é exibido menor que 480px (ver
  // regra .sig-canvas com max-width:100%), o traço desalinha do dedo/caneta.
  const getPos = e => {
    const r = ref.current.getBoundingClientRect()
    const s = e.touches ? e.touches[0] : e
    const scaleX = ref.current.width / r.width
    const scaleY = ref.current.height / r.height
    return [(s.clientX - r.left) * scaleX, (s.clientY - r.top) * scaleY]
  }
  const start = e => { e.preventDefault(); drawing.current = true; const [x,y] = getPos(e); const ctx = ref.current.getContext('2d'); ctx.beginPath(); ctx.moveTo(x,y) }
  const move = e => { if (!drawing.current) return; e.preventDefault(); const [x,y] = getPos(e); const ctx = ref.current.getContext('2d'); ctx.lineWidth=2.5; ctx.strokeStyle='#1A2535'; ctx.lineCap='round'; ctx.lineJoin='round'; ctx.lineTo(x,y); ctx.stroke(); setHasSig(true); setSemAssinatura(false) }
  const stop = () => { drawing.current = false }
  const clear = () => { ref.current.getContext('2d').clearRect(0,0,ref.current.width,ref.current.height); setHasSig(false) }
  const confirm = () => { if (!hasSig) { setSemAssinatura(true); return }; onConfirm(ref.current.toDataURL()) }
  return (
    <div>
      <div className="sig-wrap" style={semAssinatura ? {borderColor:'var(--danger)'} : null}>
        <p style={{display:'flex',alignItems:'center',gap:6}}><Icon name="signature" size={15}/> {label || 'Assine no campo abaixo'}</p>
        <canvas ref={ref} width={480} height={160} className="sig-canvas"
          onMouseDown={start} onMouseMove={move} onMouseUp={stop} onMouseLeave={stop}
          onTouchStart={start} onTouchMove={move} onTouchEnd={stop} />
        <div className="sig-actions"><button className="btn btn-ghost btn-sm" onClick={clear}><Icon name="trash" size={14}/> Limpar</button></div>
        {semAssinatura && <p style={{color:'var(--danger)',fontSize:'.8rem',marginTop:8,display:'flex',alignItems:'center',justifyContent:'center',gap:6}}><Icon name="alertTriangle" size={14}/> Assine antes de confirmar.</p>}
      </div>
      <div className="modal-footer" style={{padding:'16px 0 0',border:'none'}}>
        {onCancel && <button className="btn btn-ghost" onClick={onCancel}>Cancelar</button>}
        <button className="btn btn-primary" onClick={confirm} disabled={!hasSig}><Icon name="check" size={14}/> Confirmar assinatura</button>
      </div>
    </div>
  )
}

// ─── ITEMS EDITOR ─────────────────────────────────────────────────────────────
function ItemsEditor({ ferramentas, value, onChange }) {
  const [fId, setFId] = useState('')
  const [qty, setQty] = useState(1)
  const add = () => {
    if (!fId) return
    const f = ferramentas.find(f => f.id == fId)
    if (!f || value.find(i => i.ferramenta_id == fId)) return
    onChange([...value, { ferramenta_id: parseInt(fId), quantidade: qty, ferramenta_nome: f.nome, valor_unitario: f.valor_unitario || 0 }])
    setFId(''); setQty(1)
  }
  const remove = id => onChange(value.filter(i => i.ferramenta_id !== id))
  const updateQty = (id, q) => onChange(value.map(i => i.ferramenta_id === id ? {...i, quantidade: parseInt(q)||1} : i))
  const available = ferramentas.filter(f => !value.find(i => i.ferramenta_id === f.id))
  const total = value.reduce((s,i) => s + (i.valor_unitario||0)*(i.quantidade||1), 0)
  return (
    <div>
      <div style={{display:'flex',gap:8,marginBottom:8}}>
        <select value={fId} onChange={e=>setFId(e.target.value)} style={{flex:1}}>
          <option value="">Selecione uma ferramenta...</option>
          {available.map(f=><option key={f.id} value={f.id}>{f.nome}{f.codigo?` (${f.codigo})`:''}{f.valor_unitario?` — ${fmtBRL(f.valor_unitario)}`:''}</option>)}
        </select>
        <input type="number" min="1" value={qty} onChange={e=>setQty(parseInt(e.target.value)||1)} style={{width:70}} />
        <button className="btn btn-accent btn-sm" type="button" onClick={add}><Icon name="plus" size={14}/> Add</button>
      </div>
      {value.length > 0 && (
        <div className="items-list">
          {value.map(i => (
            <div key={i.ferramenta_id} className="item-row">
              <span style={{fontSize:'.88rem'}}>{i.ferramenta_nome}</span>
              <input type="number" min="1" value={i.quantidade} onChange={e=>updateQty(i.ferramenta_id,e.target.value)} style={{padding:'4px 8px',fontSize:'.85rem'}} />
              <span style={{fontSize:'.82rem',color:'var(--success)',fontWeight:600}}>{fmtBRL((i.valor_unitario||0)*(i.quantidade||1))}</span>
              <button className="btn btn-danger btn-sm" type="button" onClick={()=>remove(i.ferramenta_id)} style={{display:'inline-flex',alignItems:'center'}}><Icon name="x" size={14}/></button>
            </div>
          ))}
          {total > 0 && <div style={{padding:'8px 12px',background:'rgba(46,125,107,.08)',display:'flex',justifyContent:'flex-end',gap:8,fontWeight:700}}>
            <span className="text-muted">Total estimado:</span>
            <span style={{color:'var(--success)'}}>{fmtBRL(total)}</span>
          </div>}
        </div>
      )}
      {!value.length && <p className="text-muted" style={{marginTop:4}}>Nenhum item adicionado.</p>}
    </div>
  )
}

            <p><strong>4. Comunicação de comprometimento</strong><br/>Em caso de suspeita de acesso indevido ou comprometimento de suas credenciais, você deve comunicar imediatamente ao almoxarifado para que o acesso seja suspenso e uma nova senha seja criada.</p>
