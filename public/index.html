              </tr>
            ))}
            {!(stats.minhas_solicitacoes||[]).length && <tr><td colSpan="3" className="text-muted" style={{textAlign:'center',padding:20}}>Nenhuma solicitação ainda.</td></tr>}
          </tbody>
        </table></div>
      </div>
    </div>
  )

  // Operário
  return (
    <div>
      <div className="topbar"><h2>Meu Painel</h2></div>
      {stats.emp_aguardando_confirmacao > 0 && (
        <div className="pending-banner">
          <span className="msg" style={{display:'inline-flex',alignItems:'center',gap:6}}><Icon name="signature" size={15}/> Você tem {stats.emp_aguardando_confirmacao} empréstimo(s) aguardando sua confirmação</span>
          <button className="btn btn-accent btn-sm" onClick={()=>navigate('emprestimos')}>Confirmar →</button>
        </div>
      )}
      <div className="stats-grid">
        <div className="stat-card red"><div className="stat-label">Valor sob minha responsabilidade</div><div className="stat-value money">{fmtBRL(stats.valor_responsabilidade||0)}</div></div>
        <div className="stat-card"><div className="stat-label">Empréstimos ativos</div><div className="stat-value">{stats.emp_ativos||0}</div></div>
        <div className="stat-card"><div className="stat-label">Aguard. minha confirmação</div><div className="stat-value">{stats.emp_aguardando_confirmacao||0}</div></div>
      </div>
      {(stats.minhas_entregas||[]).length > 0 && (
        <div className="card">
          <div className="card-header"><span className="card-title" style={{display:'inline-flex',alignItems:'center',gap:6}}><Icon name="checkCircle" size={15}/> Ferramentas sob minha guarda</span></div>
          <div className="card-body">
            {stats.minhas_entregas.map(e=>(
              <div key={e.id} style={{padding:'8px 0',borderBottom:'1px solid var(--border)'}}>
                <strong>{e.cautela_numero}</strong>
                <span className="text-muted" style={{marginLeft:8}}>Líder: {e.lider_nome}</span>
                <span className="text-muted" style={{marginLeft:8}}>Desde: {fmt(e.data_entrega)}</span>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  )
}

// ─── SOLICITAÇÕES (fila almoxarife + acompanhamento líder) ────────────────────
function SolicitacoesPage({ user, navigate, addToast }) {
  const [lista, setLista] = useState([])
  const [detalhe, setDetalhe] = useState(null)
  const [retiradaModal, setRetiradaModal] = useState(null) // cautela para retirada
  const [authEmail, setAuthEmail] = useState('')
  const [authSenha, setAuthSenha] = useState('')
  const [authStep, setAuthStep] = useState('form') // form | termo | sign
  const [authUser, setAuthUser] = useState(null)
  const [authErr, setAuthErr] = useState('')
  const [termoHTML, setTermoHTML] = useState('')
  // --- Editar itens (separando) ---
  const [editItensModal, setEditItensModal] = useState(null)
  const [editItens, setEditItens] = useState([])
  const [editItensErr, setEditItensErr] = useState('')
  const [editItensLoading, setEditItensLoading] = useState(false)
  const [editSelFerr, setEditSelFerr] = useState('')
  const [editSelQtd, setEditSelQtd] = useState(1)
  const [editItensRemovidos, setEditItensRemovidos] = useState([])
  // --- Solicitar por Operário ---
  const [porOpModal, setPorOpModal] = useState(false)
  const [porOpStep, setPorOpStep] = useState('form') // form | sign
  const [porOpOperario, setPorOpOperario] = useState('')
  const [porOpTipo, setPorOpTipo] = useState('bolsa') // bolsa | itens
  const [porOpBolsaId, setPorOpBolsaId] = useState('')
  const [porOpItens, setPorOpItens] = useState([])
  const [porOpObs, setPorOpObs] = useState('')
  const [porOpErr, setPorOpErr] = useState('')
  const [porOpLoading, setPorOpLoading] = useState(false)
  const [porOpAuthEmail, setPorOpAuthEmail] = useState('')
  const [porOpAuthSenha, setPorOpAuthSenha] = useState('')
  const [porOpAuthErr, setPorOpAuthErr] = useState('')
  const [porOpSelFerr, setPorOpSelFerr] = useState('')
  const [porOpSelQtd, setPorOpSelQtd] = useState(1)
  const [operarios, setOperarios] = useState([])
  const [bolsasLista, setBolsasLista] = useState([])
  const [ferramentasLista, setFerramentasLista] = useState([])

  const load = () => GET('/solicitacoes').then(setLista).catch(() => {})
  useEffect(() => {
    load()
    if (user.role === 'almoxarifado') {
      GET('/usuarios').then(us => setOperarios(us.filter(u => u.role === 'operario' && u.ativo))).catch(() => {})
      GET('/bolsas').then(setBolsasLista).catch(() => {})
      GET('/ferramentas').then(setFerramentasLista).catch(() => {})
    }
  }, [])

  const abrirEditItens = (s) => {
    setEditItensModal(s)
    setEditItens(s.itens.map(i => ({ ...i })))
    setEditItensRemovidos([])
    setEditItensErr(''); setEditSelFerr(''); setEditSelQtd(1)
  }

  const addItemToEdit = () => {
    if (!editSelFerr) return
    const f = ferramentasLista.find(f => f.id == editSelFerr)
    if (!f) return
    const existe = editItens.find(i => i.ferramenta_id == editSelFerr)
    if (existe) {
      setEditItens(editItens.map(i => i.ferramenta_id == editSelFerr ? {...i, quantidade: i.quantidade + editSelQtd} : i))
    } else {
      setEditItens([...editItens, { ferramenta_id: f.id, ferramenta_nome: f.nome, quantidade: editSelQtd }])
    }
    setEditSelFerr(''); setEditSelQtd(1)
  }

  const removeItemEdit = (ferramenta_id) => {
    const nova = editItens.filter(i => i.ferramenta_id !== ferramenta_id)
    if (!nova.length) { setEditItensErr('A lista não pode ficar vazia'); return }
    const removido = editItens.find(i => i.ferramenta_id === ferramenta_id)
    setEditItensRemovidos(prev => [...prev, removido])
    setEditItensErr(''); setEditItens(nova)
  }

  const restaurarItemEdit = (ferramenta_id) => {
    const item = editItensRemovidos.find(i => i.ferramenta_id === ferramenta_id)
    if (!item) return
    setEditItens(prev => [...prev, item])
    setEditItensRemovidos(prev => prev.filter(i => i.ferramenta_id !== ferramenta_id))
  }

  const alterarQtdEdit = (ferramenta_id, qtd) => {
    const q = Math.max(1, parseInt(qtd) || 1)
    setEditItens(editItens.map(i => i.ferramenta_id === ferramenta_id ? {...i, quantidade: q} : i))
  }

  const salvarEditItens = async () => {
    if (!editItens.length) { setEditItensErr('A lista não pode ficar vazia'); return }
    setEditItensLoading(true); setEditItensErr('')
    try {
      await PUT(`/solicitacoes/${editItensModal.id}/itens`, {
        itens: editItens.map(i => ({ ferramenta_id: i.ferramenta_id, quantidade: i.quantidade }))
      })
      addToast('Lista atualizada!', 'success')
      setEditItensModal(null); load()
    } catch(e) { setEditItensErr(e.message) }
    finally { setEditItensLoading(false) }
  }

  const abrirPorOpModal = () => {
    setPorOpModal(true); setPorOpStep('form'); setPorOpOperario(''); setPorOpTipo('bolsa')
    setPorOpBolsaId(''); setPorOpItens([]); setPorOpObs(''); setPorOpErr('')
    setPorOpSelFerr(''); setPorOpSelQtd(1)
    setPorOpAuthEmail(''); setPorOpAuthSenha(''); setPorOpAuthErr('')
  }

  const addItemPorOp = () => {
    if (!porOpSelFerr) return
    const f = ferramentasLista.find(f => f.id == porOpSelFerr)
    if (!f) return
    const existe = porOpItens.find(i => i.ferramenta_id == porOpSelFerr)
    if (existe) {
      setPorOpItens(porOpItens.map(i => i.ferramenta_id == porOpSelFerr ? {...i, quantidade: i.quantidade + porOpSelQtd} : i))
    } else {
      setPorOpItens([...porOpItens, { ferramenta_id: f.id, quantidade: porOpSelQtd, nome: f.nome }])
    }
    setPorOpSelFerr(''); setPorOpSelQtd(1)
  }

  const avancarParaAssinatura = () => {
    if (!porOpOperario) { setPorOpErr('Selecione o operário.'); return }
    if (porOpTipo === 'bolsa' && !porOpBolsaId) { setPorOpErr('Selecione uma bolsa.'); return }
    if (porOpTipo === 'itens' && !porOpItens.length) { setPorOpErr('Adicione ao menos um item.'); return }
    setPorOpErr(''); setPorOpStep('sign')
  }

  const confirmarPorOperario = async () => {
    setPorOpAuthErr('')
    if (!porOpAuthEmail || !porOpAuthSenha) { setPorOpAuthErr('Preencha email e senha'); return }
    setPorOpLoading(true)
    try {
      await POST('/solicitacoes/por-operario', {
        operario_id: parseInt(porOpOperario),
        bolsa_id: porOpTipo === 'bolsa' ? parseInt(porOpBolsaId) : null,
        itens: porOpTipo === 'itens' ? porOpItens : [],
        obs: porOpObs,
        email_operario: porOpAuthEmail,
        senha_operario: porOpAuthSenha
      })
      addToast('Solicitação criada com autenticação do operário!', 'success')
      setPorOpModal(false); load()
    } catch(e) { setPorOpAuthErr(e.message) }
    finally { setPorOpLoading(false) }
  }

  const avancar = async (id, acao) => {
    try {
      await POST(`/solicitacoes/${id}/${acao}`, {})
      addToast('Status atualizado!', 'success'); load()
    } catch(e) { addToast(e.message, 'error') }
  }

  const cancelar = async (id) => {
    if (!confirm('Cancelar esta solicitação?')) return
    try { await POST(`/solicitacoes/${id}/cancelar`, {}); addToast('Cancelada.', 'success'); load() }
    catch(e) { addToast(e.message, 'error') }
  }

  const iniciarRetirada = async (sol) => {
    // Busca a cautela associada à solicitação
    try {
      const cautelas = await GET('/cautelas')
      const c = cautelas.find(c => c.solicitacao_id == sol.id && c.status === 'aguardando_retirada')
      if (!c) { addToast('Cautela não encontrada ou já retirada.', 'error'); return }
      setRetiradaModal({ cautela: c, sol })
      setAuthEmail(''); setAuthSenha(''); setAuthStep('form'); setAuthUser(null); setAuthErr('')
    } catch(e) { addToast(e.message, 'error') }
  }

  const validarLider = async () => {
    setAuthErr('')
    const isDireto = retiradaModal.cautela.cautela_tipo === 'direto'
    const roleEsperado = isDireto ? 'operario' : 'lider'
    try {
      const u = await POST('/auth/validar', { email: authEmail, senha: authSenha, role_esperado: roleEsperado })
      if (u.id !== retiradaModal.cautela.lider_id) {
        setAuthErr(`Este login não corresponde ao ${isDireto ? 'operário' : 'líder'} desta solicitação.`)
        return
      }
      setAuthUser(u)
      // Carrega o Termo antes da assinatura: ciência direta ou comodato
      try {
        const tipoTermo = retiradaModal.cautela.cautela_tipo === 'direto' ? 'ciencia_direta' : 'comodato'
        const t = await GET(`/cautelas/${retiradaModal.cautela.id}/termo/${tipoTermo}`)
        setTermoHTML(t.html || '')
      } catch(e) { setTermoHTML('') }
      setAuthStep('termo')
    } catch(e) { setAuthErr(e.message) }
  }

  const confirmarRetirada = async (sig) => {
    try {
      await POST(`/cautelas/${retiradaModal.cautela.id}/retirar`, { email: authEmail, senha: authSenha, assinatura: sig })
      addToast('Retirada registrada! Cautela ativa.', 'success')
      setRetiradaModal(null); load()
    } catch(e) { addToast(e.message, 'error') }
  }

  // Divide por status para almoxarife (kanban)
  const solicitadas  = lista.filter(s => s.status === 'solicitada')
  const separando    = lista.filter(s => s.status === 'separando')
  const prontas      = lista.filter(s => s.status === 'pronta')
  const historico    = lista.filter(s => ['retirada', 'cancelada'].includes(s.status))

  if (user.role === 'almoxarifado') return (
    <div>
      <div className="topbar">
        <h2>Fila de Solicitações</h2>
        <button className="btn btn-accent" onClick={abrirPorOpModal}><Icon name="clipboard" size={16}/> Solicitar por Operário</button>
      </div>
      <div className="kanban">
        {/* Coluna: Solicitadas */}
        <div className="kanban-col">
          <h4><span style={{display:'inline-flex',alignItems:'center',gap:6}}><Icon name="inbox" size={16}/> Novas</span> <span className="kanban-count">{solicitadas.length}</span></h4>
          {solicitadas.map(s=>(
            <div key={s.id} className="kanban-card">
              <div className="kc-numero">{s.numero} {s.assinatura_solicitante && <span style={{fontSize:'.65rem',background:'var(--primary-accent)',color:'#fff',borderRadius:4,padding:'1px 5px',marginLeft:4}}>Direto</span>}</div>
              <div className="kc-lider" style={{display:'flex',alignItems:'center',gap:5}}><Icon name="worker" size={13}/> {s.lider_nome}{s.assinatura_solicitante && <span style={{fontSize:'.7rem',color:'var(--text-secondary)',marginLeft:4}}>(operário)</span>}</div>
              <div className="kc-valor">{fmtBRL(s.valor_total)} · {s.itens.length} item(ns)</div>
              <div className="kc-actions">
                <button className="btn btn-primary btn-sm" onClick={()=>avancar(s.id,'separando')}>Iniciar separação</button>
                <button className="btn btn-ghost btn-sm" onClick={()=>setDetalhe(s)}><Icon name="eye" size={14}/> Ver</button>
              </div>
            </div>
          ))}
          {!solicitadas.length && <p className="text-muted" style={{fontSize:'.82rem',textAlign:'center',padding:12}}>Nenhuma</p>}
        </div>
        {/* Coluna: Separando */}
        <div className="kanban-col">
          <h4><span style={{display:'inline-flex',alignItems:'center',gap:6}}><Icon name="package" size={16}/> Separando</span> <span className="kanban-count">{separando.length}</span></h4>
          {separando.map(s=>(
            <div key={s.id} className="kanban-card">
              <div className="kc-numero">{s.numero} {s.assinatura_solicitante && <span style={{fontSize:'.65rem',background:'var(--primary-accent)',color:'#fff',borderRadius:4,padding:'1px 5px',marginLeft:4}}>Direto</span>}</div>
              <div className="kc-lider" style={{display:'flex',alignItems:'center',gap:5}}><Icon name="worker" size={13}/> {s.lider_nome}{s.assinatura_solicitante && <span style={{fontSize:'.7rem',color:'var(--text-secondary)',marginLeft:4}}>(operário)</span>}</div>
              <div className="kc-valor">{fmtBRL(s.valor_total)}</div>
              <div className="kc-actions">
                <button className="btn btn-success btn-sm" onClick={()=>avancar(s.id,'pronta')}><Icon name="checkCircle" size={14}/> Pronto</button>
                <button className="btn btn-ghost btn-sm" onClick={()=>abrirEditItens(s)}><Icon name="edit" size={14}/> Editar lista</button>
                <button className="btn btn-ghost btn-sm" onClick={()=>setDetalhe(s)}><Icon name="eye" size={14}/> Ver</button>
              </div>
            </div>
          ))}
          {!separando.length && <p className="text-muted" style={{fontSize:'.82rem',textAlign:'center',padding:12}}>Nenhuma</p>}
        </div>
        {/* Coluna: Prontas */}
        <div className="kanban-col">
          <h4><span style={{display:'inline-flex',alignItems:'center',gap:6}}><span style={{width:8,height:8,borderRadius:'50%',background:'var(--success)',display:'inline-block'}}/> Pronto p/ retirada</span> <span className="kanban-count">{prontas.length}</span></h4>
          {prontas.map(s=>(
            <div key={s.id} className="kanban-card">
              <div className="kc-numero">{s.numero} {s.assinatura_solicitante && <span style={{fontSize:'.65rem',background:'var(--primary-accent)',color:'#fff',borderRadius:4,padding:'1px 5px',marginLeft:4}}>Direto</span>}</div>
              <div className="kc-lider" style={{display:'flex',alignItems:'center',gap:5}}><Icon name="worker" size={13}/> {s.lider_nome}{s.assinatura_solicitante && <span style={{fontSize:'.7rem',color:'var(--text-secondary)',marginLeft:4}}>(operário)</span>}</div>
              <div className="kc-valor">{fmtBRL(s.valor_total)}</div>
              <div className="kc-actions">
                <button className="btn btn-accent btn-sm" onClick={()=>iniciarRetirada(s)}><Icon name="signature" size={14}/> Registrar retirada</button>
                <button className="btn btn-ghost btn-sm" onClick={()=>setDetalhe(s)}><Icon name="eye" size={14}/> Ver</button>
              </div>
            </div>
          ))}
          {!prontas.length && <p className="text-muted" style={{fontSize:'.82rem',textAlign:'center',padding:12}}>Nenhuma</p>}
        </div>
      </div>

      {/* Histórico */}
      {historico.length > 0 && (
        <div className="card">
          <div className="card-header"><span className="card-title">Histórico</span></div>
          <div className="table-wrap"><table className="cards-mobile">
            <thead><tr><th>Número</th><th>Líder</th><th>Data</th><th>Status</th></tr></thead>
            <tbody>{historico.map(s=>(
              <tr key={s.id}>
                <td className="fw-bold" data-label="Número">{s.numero}</td>
                <td data-label="Líder">{s.lider_nome}</td>
                <td data-label="Data">{fmt(s.criado_em)}</td>
                <td data-label="Status"><span className={`badge badge-${s.status}`}>{STATUS_LABEL[s.status]}</span></td>
              </tr>
            ))}</tbody>
          </table></div>
        </div>
      )}

      {/* Modal detalhe */}
      {detalhe && (
        <div className="modal-overlay open">
          <div className="modal modal-md">
            <div className="modal-header"><h3>Solicitação {detalhe.numero}</h3><button className="modal-close" onClick={()=>setDetalhe(null)}>×</button></div>
            <div className="modal-body">
              <p><strong>Líder:</strong> {detalhe.lider_nome} ({detalhe.lider_email})</p>
              {detalhe.bolsa_nome && <p style={{marginTop:8}}><strong>Bolsa:</strong> {detalhe.bolsa_nome}</p>}
              {detalhe.obs && <p style={{marginTop:8}} className="text-muted">Obs: {detalhe.obs}</p>}
              <hr className="divider" />
              <p className="fw-bold" style={{marginBottom:8}}>Itens solicitados</p>
              <div className="items-list">
                {detalhe.itens.map(i=>(
                  <div key={i.id} className="item-row">
                    <span>{i.ferramenta_nome}</span>
                    <span><strong>{i.quantidade}x</strong></span>
                    <span style={{color:'var(--success)',fontSize:'.82rem'}}>{fmtBRL(i.valor_unitario||0)}</span>
                    <span style={{fontWeight:600}}>{fmtBRL(i.valor_item||0)}</span>
                  </div>
                ))}
                <div style={{padding:'8px 12px',background:'rgba(46,125,107,.08)',fontWeight:700,display:'flex',justifyContent:'flex-end',gap:8}}>
                  <span className="text-muted">Total:</span><span style={{color:'var(--success)'}}>{fmtBRL(detalhe.valor_total)}</span>
                </div>
              </div>
            </div>
            <div className="modal-footer"><button className="btn btn-ghost" onClick={()=>setDetalhe(null)}>Fechar</button></div>
          </div>
        </div>
      )}

      {/* Modal Editar Itens (separando) */}
      {editItensModal && (
        <div className="modal-overlay open">
          <div className="modal modal-md">
            <div className="modal-header">
              <h3 style={{display:'flex',alignItems:'center',gap:8}}><Icon name="edit" size={17}/> Editar itens — {editItensModal.numero}</h3>
              <button className="modal-close" onClick={()=>setEditItensModal(null)}>×</button>
            </div>
            <div className="modal-body">
              {editItensErr && <div className="alert alert-error" style={{marginBottom:12}}>{editItensErr}</div>}

              {/* Lista atual */}
              <p className="fw-bold" style={{marginBottom:8,fontSize:'.85rem'}}>Itens do pedido</p>
              <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:16}}>
                {editItens.map(i => (
                  <div key={i.ferramenta_id} style={{display:'flex',alignItems:'center',gap:10,background:'var(--bg)',borderRadius:6,padding:'8px 12px'}}>
                    <span style={{flex:1,fontSize:'.88rem'}}>{i.ferramenta_nome}</span>
                    <div style={{display:'flex',alignItems:'center',gap:6}}>
                      <label style={{fontSize:'.75rem',color:'var(--text-secondary)'}}>Qtd:</label>
                      <input type="number" min="1" value={i.quantidade}
                        onChange={e=>alterarQtdEdit(i.ferramenta_id, e.target.value)}
                        style={{width:60,padding:'3px 6px',fontSize:'.85rem'}} />
                    </div>
                    <button onClick={()=>removeItemEdit(i.ferramenta_id)}
                      style={{background:'none',border:'none',cursor:'pointer',color:'var(--danger)',padding:'0 4px',display:'inline-flex',alignItems:'center'}}
                      title="Remover item"><Icon name="x" size={15}/></button>
                  </div>
                ))}
                {editItens.length === 0 && <p className="text-muted" style={{textAlign:'center',padding:8}}>Nenhum item.</p>}
              </div>

              {/* Itens removidos */}
              {editItensRemovidos.length > 0 && (<>
                <hr className="divider" />
                <p className="fw-bold" style={{marginBottom:8,fontSize:'.85rem',color:'var(--danger)',display:'flex',alignItems:'center',gap:6}}><Icon name="trash" size={14}/> Itens removidos</p>
                <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:16}}>
                  {editItensRemovidos.map(i => (
                    <div key={i.ferramenta_id} style={{display:'flex',alignItems:'center',gap:10,background:'#fef2f2',borderRadius:6,padding:'8px 12px',border:'1px solid #fecaca'}}>
                      <span style={{flex:1,fontSize:'.88rem',color:'var(--danger)',textDecoration:'line-through'}}>{i.ferramenta_nome}</span>
                      <span style={{fontSize:'.8rem',color:'var(--text-secondary)'}}>{i.quantidade}x</span>
                      <button onClick={()=>restaurarItemEdit(i.ferramenta_id)}
                        style={{background:'none',border:'1px solid var(--success)',borderRadius:4,cursor:'pointer',color:'var(--success)',fontSize:'.75rem',padding:'2px 8px',display:'inline-flex',alignItems:'center',gap:4}}>
                        <Icon name="undo" size={12}/> Restaurar
                      </button>
                    </div>
                  ))}
                </div>
              </>)}

              {/* Adicionar item */}
              <hr className="divider" />
              <p className="fw-bold" style={{marginBottom:8,fontSize:'.85rem'}}>Adicionar item</p>
              <div style={{display:'flex',gap:8,alignItems:'flex-end'}}>
                <div className="form-group" style={{flex:1,marginBottom:0}}>
                  <select value={editSelFerr} onChange={e=>setEditSelFerr(e.target.value)}>
                    <option value="">Selecione a ferramenta...</option>
                    {ferramentasLista.map(f=><option key={f.id} value={f.id}>{f.nome}</option>)}
                  </select>
                </div>
                <div style={{width:70}}>
                  <input type="number" min="1" value={editSelQtd}
                    onChange={e=>setEditSelQtd(Math.max(1,parseInt(e.target.value)||1))}
                    style={{padding:'6px 8px',fontSize:'.85rem',width:'100%'}} />
                </div>
                <button className="btn btn-primary btn-sm" onClick={addItemToEdit} disabled={!editSelFerr}><Icon name="plus" size={14}/> Add</button>
              </div>
            </div>
            <div className="modal-footer">
              <button className="btn btn-ghost" onClick={()=>setEditItensModal(null)}>Cancelar</button>
              <button className="btn btn-primary" onClick={salvarEditItens} disabled={editItensLoading || !editItens.length}>
                {editItensLoading ? 'Salvando...' : <span style={{display:'inline-flex',alignItems:'center',gap:6}}><Icon name="save" size={14}/> Salvar lista</span>}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Modal Solicitar por Operário */}
      {porOpModal && (
        <div className="modal-overlay open">
          <div className="modal modal-md">
            <div className="modal-header">
              <h3 style={{display:'flex',alignItems:'center',gap:8}}><Icon name="clipboard" size={17}/> Solicitar por Operário</h3>
              <button className="modal-close" onClick={()=>setPorOpModal(false)}>×</button>
            </div>
            <div className="modal-body">
              {porOpStep === 'form' && (
                <>
                  <div className="alert alert-info" style={{marginBottom:16}}>
                    O operário está presente no almoxarifado. Selecione-o, escolha a bolsa ou itens, e na próxima etapa ele assina neste dispositivo.
                  </div>
                  {porOpErr && <div className="alert alert-error" style={{marginBottom:12}}>{porOpErr}</div>}
                  <div className="form-group">
                    <label>Operário *</label>
                    <select value={porOpOperario} onChange={e=>setPorOpOperario(e.target.value)}>
                      <option value="">Selecione o operário...</option>
                      {operarios.map(o=><option key={o.id} value={o.id}>{o.nome} {o.cargo ? `— ${o.cargo}` : ''}</option>)}
                    </select>
                  </div>
                  <div className="form-group" style={{marginTop:12}}>
                    <label>Tipo de solicitação</label>
                    <div style={{display:'flex',gap:8,marginTop:6}}>
                      <button className={`btn btn-sm ${porOpTipo==='bolsa' ? 'btn-primary' : 'btn-ghost'}`} onClick={()=>setPorOpTipo('bolsa')} style={{display:'inline-flex',alignItems:'center',gap:6}}><Icon name="backpack" size={14}/> Por Bolsa</button>
                      <button className={`btn btn-sm ${porOpTipo==='itens' ? 'btn-primary' : 'btn-ghost'}`} onClick={()=>setPorOpTipo('itens')} style={{display:'inline-flex',alignItems:'center',gap:6}}><Icon name="wrench" size={14}/> Itens avulsos</button>
                    </div>
                  </div>
                  {porOpTipo === 'bolsa' && (
                    <div className="form-group" style={{marginTop:12}}>
                      <label>Bolsa *</label>
                      <select value={porOpBolsaId} onChange={e=>setPorOpBolsaId(e.target.value)}>
                        <option value="">Selecione a bolsa...</option>
                        {bolsasLista.map(b=><option key={b.id} value={b.id}>{b.nome}</option>)}
                      </select>
                    </div>
                  )}
                  {porOpTipo === 'itens' && (
                    <div style={{marginTop:12}}>
                      <div style={{display:'flex',gap:8,alignItems:'flex-end',marginBottom:8}}>
                        <div className="form-group" style={{flex:1,marginBottom:0}}>
                          <label>Ferramenta</label>
                          <select value={porOpSelFerr} onChange={e=>setPorOpSelFerr(e.target.value)}>
                            <option value="">Selecione...</option>
                            {ferramentasLista.map(f=><option key={f.id} value={f.id}>{f.nome}</option>)}
                          </select>
                        </div>
                        <div className="form-group" style={{width:72,marginBottom:0}}>
                          <label>Qtd</label>
                          <input type="number" min="1" value={porOpSelQtd} onChange={e=>setPorOpSelQtd(parseInt(e.target.value)||1)} />
                        </div>
                        <button className="btn btn-primary btn-sm" style={{marginBottom:0,height:38}} onClick={addItemPorOp}><Icon name="plus" size={14}/> Add</button>
                      </div>
                      {porOpItens.length > 0 && (
                        <div style={{background:'var(--bg)',borderRadius:6,padding:8}}>
                          {porOpItens.map((it,i)=>(
                            <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',fontSize:'.85rem',padding:'3px 0'}}>
                              <span>{it.nome}</span>
                              <span style={{display:'flex',gap:8,alignItems:'center'}}>
                                <strong>{it.quantidade}x</strong>
                                <button style={{background:'none',border:'none',cursor:'pointer',color:'var(--danger)',padding:0,display:'inline-flex',alignItems:'center'}} onClick={()=>setPorOpItens(porOpItens.filter((_,j)=>j!==i))}><Icon name="x" size={13}/></button>
                              </span>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  )}
                  <div className="form-group" style={{marginTop:12}}>
                    <label>Observação</label>
                    <input type="text" value={porOpObs} onChange={e=>setPorOpObs(e.target.value)} placeholder="Opcional..." />
                  </div>
                  <div style={{marginTop:16,textAlign:'right'}}>
                    <button className="btn btn-primary" onClick={avancarParaAssinatura}>Próximo: Assinatura do Operário →</button>
                  </div>
                </>
              )}
              {porOpStep === 'sign' && (
                <>
                  <div className="auth-device-box">
                    <h4 style={{display:'flex',alignItems:'center',gap:8}}><Icon name="lock" size={16}/> {operarios.find(o=>o.id==porOpOperario)?.nome || 'Operário'} — confirme seu acesso</h4>
                    <p style={{fontSize:'.82rem',color:'var(--text-secondary)',marginBottom:12}}>
                      {porOpTipo==='bolsa'
                        ? `Bolsa: ${bolsasLista.find(b=>b.id==porOpBolsaId)?.nome || '—'}`
                        : `${porOpItens.length} item(ns) avulso(s)`}
                      {porOpObs && ` · Obs: ${porOpObs}`}
                    </p>
                    {porOpAuthErr && <div className="alert alert-error" style={{marginBottom:10}}>{porOpAuthErr}</div>}
                    <div className="form-grid">
                      <div className="form-group">
                        <label>Email</label>
                        <input type="email" value={porOpAuthEmail} onChange={e=>setPorOpAuthEmail(e.target.value)}
                          placeholder={operarios.find(o=>o.id==porOpOperario)?.email || 'seu@email.com'} />
                      </div>
                      <div className="form-group">
                        <label>Senha</label>
                        <input type="password" value={porOpAuthSenha} onChange={e=>setPorOpAuthSenha(e.target.value)}
                          placeholder="••••••••" onKeyDown={e=>e.key==='Enter'&&confirmarPorOperario()} />
                      </div>
                    </div>
                    <div style={{marginTop:12,display:'flex',gap:8,justifyContent:'flex-end'}}>
                      <button className="btn btn-ghost" onClick={()=>setPorOpStep('form')}>← Voltar</button>
                      <button className="btn btn-primary" onClick={confirmarPorOperario} disabled={porOpLoading}>
                        {porOpLoading ? 'Autenticando...' : 'Confirmar →'}
                      </button>
                    </div>
                  </div>
                </>
              )}
            </div>
          </div>
        </div>
      )}

      {/* Modal retirada (auth líder no dispositivo do almoxarife) */}
      {retiradaModal && (
        <div className="modal-overlay open">
          <div className="modal modal-md">
            <div className="modal-header">
              <h3>Retirada — {retiradaModal.sol.numero}</h3>
              <button className="modal-close" onClick={()=>setRetiradaModal(null)}>×</button>
            </div>
            <div className="modal-body">
              {authStep === 'form' && (
                <>
                  <div className="alert alert-info">{retiradaModal.cautela.cautela_tipo==='direto' ? 'O operário deve autenticar neste dispositivo para confirmar a retirada.' : 'O líder deve autenticar neste dispositivo para confirmar a retirada.'}</div>
                  <div className="auth-device-box">
                    <h4 style={{display:'flex',alignItems:'center',gap:8}}><Icon name="lock" size={16}/> Autenticação {retiradaModal.cautela.cautela_tipo==='direto' ? 'do Operário' : 'do Líder'}: {retiradaModal.sol.lider_nome}</h4>
                    {authErr && <div className="alert alert-error" style={{display:'flex',alignItems:'center',gap:8}}><Icon name="alertTriangle" size={15}/> {authErr}</div>}
                    <div className="form-grid">
                      <div className="form-group"><label>Email</label><input type="email" value={authEmail} onChange={e=>setAuthEmail(e.target.value)} placeholder={retiradaModal.sol.lider_email} /></div>
                      <div className="form-group"><label>Senha</label><input type="password" value={authSenha} onChange={e=>setAuthSenha(e.target.value)} placeholder="••••••••" /></div>
                    </div>
                    <div style={{marginTop:12,textAlign:'right'}}>
                      <button className="btn btn-primary" onClick={validarLider}>Autenticar →</button>
                    </div>
                  </div>
                </>
              )}
              {authStep === 'termo' && authUser && (
                <>
                  <div className="alert alert-success" style={{display:'flex',alignItems:'center',gap:8}}><Icon name="checkCircle" size={16}/> Autenticado como {authUser.nome}. Leia o Termo de {retiradaModal.cautela.cautela_tipo==='direto' ? 'Ciência' : 'Comodato'} antes de assinar.</div>
                  <div style={{border:'2px solid var(--primary)',borderRadius:8,maxHeight:380,overflowY:'auto',padding:16,background:'#fafbfc',marginBottom:16,fontSize:'.82rem',lineHeight:1.6}}>
                    {termoHTML
                      ? <div dangerouslySetInnerHTML={{__html: termoHTML}} />
                      : <p style={{color:'var(--text-secondary)'}}>Carregando termo...</p>}
                  </div>
                  <div style={{textAlign:'right'}}>
                    <button className="btn btn-primary" onClick={()=>setAuthStep('sign')} style={{display:'inline-flex',alignItems:'center',gap:6}}>Li e concordo → Assinar <Icon name="signature" size={14}/></button>
                  </div>
                </>
              )}
              {authStep === 'sign' && authUser && (
                <>
                  <div className="alert alert-success" style={{display:'flex',alignItems:'center',gap:8}}><Icon name="checkCircle" size={16}/> Autenticado como {authUser.nome}. Confira os itens e assine abaixo.</div>
                  <div style={{background:'rgba(46,125,107,.08)',border:'1px solid rgba(46,125,107,.35)',borderRadius:8,padding:12,marginBottom:16}}>
                    {retiradaModal.sol.itens.map(i=>(
                      <div key={i.id} style={{display:'flex',justifyContent:'space-between',fontSize:'.85rem',marginBottom:4}}>
                        <span>{i.ferramenta_nome} × {i.quantidade}</span>
                        <span style={{color:'var(--success)',fontWeight:600}}>{fmtBRL(i.valor_item||0)}</span>
                      </div>
                    ))}
                    <div style={{borderTop:'1px solid rgba(46,125,107,.35)',marginTop:8,paddingTop:8,display:'flex',justifyContent:'space-between',fontWeight:700}}>
                      <span>TOTAL SOB RESPONSABILIDADE:</span>
                      <span style={{color:'var(--success)'}}>{fmtBRL(retiradaModal.sol.valor_total)}</span>
                    </div>
                  </div>
                  <div className="alert alert-warning" style={{display:'flex',alignItems:'center',gap:8}}><Icon name="alertTriangle" size={16}/> Ao assinar, você confirma o recebimento das ferramentas e assume a responsabilidade perante a {empresaInfo.razaoSocial}.</div>
                  <SignaturePad label={`Assinatura de ${authUser.nome}`} onConfirm={confirmarRetirada} onCancel={()=>setAuthStep('termo')} />
                </>
              )}
            </div>
          </div>
        </div>
      )}
    </div>
  )

  // Líder — acompanhar próprias solicitações
  return (
    <div>
      <div className="topbar">
        <h2>Minhas Solicitações</h2>
        <button className="btn btn-accent" onClick={()=>navigate('nova-solicitacao')}><Icon name="plus" size={14}/> Nova Solicitação</button>
      </div>
      <div className="card">
        <div className="table-wrap"><table className="cards-mobile">
          <thead><tr><th>Número</th><th>Itens</th><th>Valor</th><th>Data</th><th>Status</th><th>Ações</th></tr></thead>
          <tbody>
            {lista.map(s=>(
              <tr key={s.id}>
                <td className="fw-bold" data-label="Número">{s.numero}</td>
                <td data-label="Itens">{s.itens.length} tipo(s)</td>
                <td data-label="Valor" style={{color:'var(--success)',fontWeight:600}}>{fmtBRL(s.valor_total)}</td>
                <td data-label="Data">{fmt(s.criado_em)}</td>
                <td data-label="Status"><span className={`badge badge-${s.status}`}>{STATUS_LABEL[s.status]}</span></td>
                <td className="cell-actions"><div className="actions">
                  <button className="btn btn-ghost btn-sm" onClick={()=>setDetalhe(s)} style={{display:'inline-flex',alignItems:'center',gap:5}}><Icon name="eye" size={14}/> Ver</button>
                  {['solicitada','separando'].includes(s.status) && (
                    <button className="btn btn-danger btn-sm" onClick={()=>cancelar(s.id)}>Cancelar</button>
                  )}
                </div></td>
              </tr>
            ))}
            {!lista.length && <tr><td colSpan="6"><div className="empty"><div className="empty-icon"><Icon name="clipboard" size={32}/></div><p>Você ainda não fez nenhuma solicitação.</p><button className="btn btn-accent empty-cta" onClick={()=>navigate('nova-solicitacao')}><Icon name="plus" size={14}/> Nova solicitação</button></div></td></tr>}
          </tbody>
        </table></div>
      </div>
      {detalhe && (
        <div className="modal-overlay open">
          <div className="modal modal-md">
            <div className="modal-header"><h3>Solicitação {detalhe.numero}</h3><button className="modal-close" onClick={()=>setDetalhe(null)}>×</button></div>
            <div className="modal-body">
              <p><span className={`badge badge-${detalhe.status}`}>{STATUS_LABEL[detalhe.status]}</span></p>
              {detalhe.obs && <p style={{marginTop:8}} className="text-muted">Obs: {detalhe.obs}</p>}
              <hr className="divider" />
              <div className="items-list">
                {detalhe.itens.map(i=>(
                  <div key={i.id} className="item-row">
                    <span>{i.ferramenta_nome}</span>
                    <span><strong>{i.quantidade}x</strong></span>
                    <span style={{color:'var(--success)',fontSize:'.82rem'}}>{fmtBRL(i.valor_unitario||0)}</span>
                    <span style={{fontWeight:600}}>{fmtBRL(i.valor_item||0)}</span>
                  </div>
                ))}
                <div style={{padding:'8px 12px',background:'rgba(46,125,107,.08)',fontWeight:700,display:'flex',justifyContent:'flex-end',gap:8}}>
                  <span className="text-muted">Total:</span><span style={{color:'var(--success)'}}>{fmtBRL(detalhe.valor_total)}</span>
                </div>
              </div>
            </div>
            <div className="modal-footer"><button className="btn btn-ghost" onClick={()=>setDetalhe(null)}>Fechar</button></div>
          </div>
        </div>
      )}
    </div>
  )
}

// ─── NOVA SOLICITAÇÃO (líder) ─────────────────────────────────────────────────
function NovaSolicitacaoPage({ user, navigate, addToast }) {
  const [bolsas, setBolsas] = useState([])
  const [ferramentas, setFerramentas] = useState([])
  const [form, setForm] = useState({ tipo: 'bolsa' })
  const [itens, setItens] = useState([])
  const [loading, setLoading] = useState(false)

  useEffect(() => { GET('/bolsas').then(setBolsas); GET('/ferramentas').then(setFerramentas) }, [])

  const selecionarBolsa = id => {
    setForm({...form, bolsa_id: id})
    const b = bolsas.find(b => b.id == id)
    if (b) setItens(b.itens.map(i => ({ ferramenta_id: i.ferramenta_id, quantidade: i.quantidade, ferramenta_nome: i.ferramenta_nome, valor_unitario: i.valor_unitario || 0 })))
    else setItens([])
  }

  const enviar = async () => {
    if (!itens.length) { addToast('Adicione ao menos um item.', 'error'); return }
    setLoading(true)
    try {
      await POST('/solicitacoes', { bolsa_id: form.bolsa_id || null, itens, obs: form.obs || '' })
      addToast('Solicitação enviada ao almoxarifado!', 'success')
      navigate('solicitacoes')
    } catch(e) { addToast(e.message, 'error') }
    setLoading(false)
  }

  return (
    <div>
      <div className="topbar">
        <h2>Nova Solicitação</h2>
        <button className="btn btn-ghost" onClick={()=>navigate('solicitacoes')}>← Voltar</button>
      </div>
      <div className="card">
        <div className="card-header"><span className="card-title">Solicitar ferramentas ao almoxarifado</span></div>
        <div className="card-body">
          <div className="alert alert-warning" style={{display:'flex',alignItems:'center',gap:8}}><Icon name="alertTriangle" size={16}/> Você é responsável pelos itens solicitados. Solicite somente o que sua equipe realmente precisará.</div>
          <div style={{marginBottom:12}}>
            <label>Tipo de solicitação</label>
            <div className="gap-8" style={{marginTop:8}}>
              <button className={`btn ${form.tipo==='bolsa'?'btn-primary':'btn-ghost'}`} onClick={()=>setForm({...form,tipo:'bolsa',bolsa_id:undefined})} style={{display:'inline-flex',alignItems:'center',gap:6}}><Icon name="backpack" size={14}/> Bolsa padrão</button>
              <button className={`btn ${form.tipo==='avulso'?'btn-primary':'btn-ghost'}`} onClick={()=>{setForm({...form,tipo:'avulso',bolsa_id:undefined});setItens([])}} style={{display:'inline-flex',alignItems:'center',gap:6}}><Icon name="wrench" size={14}/> Avulso</button>
            </div>
          </div>
          {form.tipo === 'bolsa' && (
            <div className="form-group" style={{marginBottom:16}}>
              <label>Bolsa</label>
              <select value={form.bolsa_id||''} onChange={e=>selecionarBolsa(e.target.value)}>
                <option value="">Selecione uma bolsa...</option>
                {bolsas.map(b=><option key={b.id} value={b.id}>{b.nome} — {fmtBRL(b.valor_total)}</option>)}
              </select>
            </div>
          )}
          <label style={{display:'block',marginBottom:6}}>Itens {form.tipo==='bolsa'?'(editáveis)':''}</label>
          <ItemsEditor ferramentas={ferramentas} value={itens} onChange={setItens} />
          <hr className="divider" />
          <div className="form-group">
            <label>Observações</label>
            <textarea value={form.obs||''} onChange={e=>setForm({...form,obs:e.target.value})} placeholder="Obra, necessidade, prazo urgente..." />
          </div>
          <div style={{marginTop:16,textAlign:'right'}}>
            <button className="btn btn-accent" onClick={enviar} disabled={loading || !itens.length}>
              {loading ? 'Enviando...' : <span style={{display:'inline-flex',alignItems:'center',gap:6}}><Icon name="send" size={14}/> Enviar solicitação</span>}
            </button>
          </div>
        </div>
      </div>
    </div>
  )
}

// ─── CAUTELAS (líder: entregas ao operário) ───────────────────────────────────
function CautelasPage({ user, navigate, addToast }) {
  const [lista, setLista] = useState([])
  const [detalhe, setDetalhe] = useState(null)
  const [entregaModal, setEntregaModal] = useState(null)
  const [devModal, setDevModal] = useState(null)
  const [ferramentas, setFerramentas] = useState([])
  // Auth operário no dispositivo do líder
  const [authEmail, setAuthEmail] = useState('')
  const [authSenha, setAuthSenha] = useState('')
  const [authStep, setAuthStep] = useState('form') // form | termo | sign
  const [authUser, setAuthUser] = useState(null)
  const [authErr, setAuthErr] = useState('')
  const [entregaItens, setEntregaItens] = useState([])
  const [termoHTML, setTermoHTML] = useState('')
  // Devolução com auth do responsável
  const [devEmail, setDevEmail] = useState('')
  const [devSenha, setDevSenha] = useState('')
  const [devStep, setDevStep] = useState('form') // form | sign
  const [devErr, setDevErr] = useState('')
  const [operarios, setOperarios] = useState([])
  const [selFerr, setSelFerr] = useState(''); const [selQtd, setSelQtd] = useState(1)

  const load = () => GET('/cautelas').then(setLista).catch(()=>{})
  useEffect(() => {
    load(); GET('/ferramentas').then(setFerramentas)
    GET('/usuarios').then(us => setOperarios(us.filter(u=>u.role==='operario'&&u.ativo)))
  }, [])

  const verDetalhe = async c => {
    const full = await GET(`/cautelas/${c.id}`)
    setDetalhe(full)
  }

  const verTermo = async (id, tipo) => {
    try {
      const { html } = await GET(`/cautelas/${id}/termo/${tipo}`)
      const w = window.open('', '_blank', 'width=900,height=700,scrollbars=yes')
      w.document.write(html); w.document.close()
    } catch(e) { addToast(e.message, 'error') }
  }

  const abrirEntrega = c => {
    setEntregaModal(c)
    setAuthEmail(''); setAuthSenha(''); setAuthStep('form'); setAuthUser(null); setAuthErr('')
    setEntregaItens(c.itens ? c.itens.map(i=>({ferramenta_id:i.ferramenta_id,quantidade:i.quantidade,ferramenta_nome:i.ferramenta_nome,valor_unitario:i.valor_unitario||0})) : [])
  }

  const validarOperario = async () => {
    setAuthErr('')
    try {
      const u = await POST('/auth/validar', { email: authEmail, senha: authSenha, role_esperado: 'operario' })
      setAuthUser(u)
      // Exibe Termo de Ciência antes da assinatura do operário
      try {
        const t = await GET(`/cautelas/${entregaModal.id}/termo/ciencia_direta`)
        setTermoHTML(t.html || '')
      } catch(e) { setTermoHTML('') }
      setAuthStep('termo')
    } catch(e) { setAuthErr(e.message) }
  }

  const confirmarEntrega = async sig => {
    try {
      const r = await POST(`/cautelas/${entregaModal.id}/entregas`, { email: authEmail, senha: authSenha, assinatura: sig, itens: entregaItens })
      addToast(`Entrega registrada para ${r.operario_nome}!`, 'success')
      setEntregaModal(null); load()
    } catch(e) { addToast(e.message, 'error') }
  }

  const devolverEntrega = async (cautelaId, entregaId) => {
    if (!confirm('Confirmar devolução desta entrega?')) return
    try {
      await POST(`/cautelas/${cautelaId}/entregas/${entregaId}/devolver`, {})
      addToast('Devolução registrada!', 'success')
      const full = await GET(`/cautelas/${cautelaId}`)
      setDetalhe(full); load()
    } catch(e) { addToast(e.message, 'error') }
  }

  const abrirDevolver = c => {
    setDevModal({...c, obs:''})
    setDevEmail(''); setDevSenha(''); setDevStep('form'); setDevErr('')
  }

  const validarLiderDev = async () => {
    setDevErr('')
    try {
      const roleEsperado = devModal.cautela_tipo === 'direto' ? 'operario' : 'lider'
      const u = await POST('/auth/validar', { email: devEmail, senha: devSenha, role_esperado: roleEsperado })
      if (u.id !== devModal.lider_id) { setDevErr(`Este login não corresponde ao responsável desta cautela.`); return }
      setDevStep('sign')
    } catch(e) { setDevErr(e.message) }
  }

  const devolver = async (sig) => {
    try {
      await POST(`/cautelas/${devModal.id}/devolver`, { email: devEmail, senha: devSenha, assinatura: sig, obs_devolucao: devModal.obs || '' })
      addToast('Cautela devolvida com assinatura!', 'success')
      setDevModal(null); setDetalhe(null); load()
    } catch(e) { addToast(e.message, 'error') }
  }

  const verTermoDevolucao = async (id) => {
    try {
      const { html } = await GET(`/cautelas/${id}/termo/devolucao`)
      const w = window.open('', '_blank', 'width=900,height=700,scrollbars=yes')
      w.document.write(html); w.document.close()
    } catch(e) { addToast('Recibo indisponível (cautela ainda não devolvida ou sem assinatura).', 'warning') }
  }

  const isLider = user.role === 'lider'
  const isAlm   = user.role === 'almoxarifado'

  return (
    <div>
      <div className="topbar">
        <h2>Cautelas</h2>
      </div>
      <div className="card">
        <div className="table-wrap"><table className="cards-mobile">
          <thead><tr><th>Número</th><th>Tipo</th><th>Responsável</th><th>Retirada</th><th>Valor</th><th>Status</th><th>Ações</th></tr></thead>
          <tbody>
            {lista.map(c=>(
              <tr key={c.id}>
                <td className="fw-bold" data-label="Número">{c.numero}</td>
                <td data-label="Tipo">{c.cautela_tipo==='direto' ? <span className="badge badge-solicitada">Direta</span> : <span className="badge badge-lider">Via Líder</span>}</td>
                <td data-label="Responsável">{c.lider_nome}{c.cautela_tipo==='direto'&&<><br/><span style={{fontSize:'.7rem',color:'var(--text-secondary)'}}>Operário</span></>}</td>
                <td data-label="Retirada">{fmt(c.data_retirada)}</td>
                <td data-label="Valor" style={{color:'var(--success)',fontWeight:600}}>{fmtBRL(c.valor_total)}</td>
                <td data-label="Status"><span className={`badge badge-${c.status}`}>{STATUS_LABEL[c.status]}</span></td>
                <td className="cell-actions"><div className="actions">
                  <button className="btn btn-outline btn-sm" onClick={()=>verDetalhe(c)} style={{display:'inline-flex',alignItems:'center',gap:5}}><Icon name="eye" size={14}/> Ver</button>
                  {isLider && c.cautela_tipo!=='direto' && c.status === 'ativa' && c.lider_id === user.id && (
                    <button className="btn btn-accent btn-sm" onClick={()=>abrirEntrega(c)} style={{display:'inline-flex',alignItems:'center',gap:5}}><Icon name="send" size={14}/> Entregar a operário</button>
                  )}
                  {(isLider || isAlm) && c.status === 'ativa' && (
                    <button className="btn btn-success btn-sm" onClick={()=>abrirDevolver(c)} style={{display:'inline-flex',alignItems:'center',gap:5}}><Icon name="download" size={14}/> Devolver</button>
                  )}
                </div></td>
              </tr>
            ))}
            {!lista.length && <tr><td colSpan="7"><div className="empty"><div className="empty-icon"><Icon name="clipboard" size={32}/></div><p>Nenhuma cautela.</p></div></td></tr>}
          </tbody>
        </table></div>
      </div>

      {/* Detalhe */}
      {detalhe && (
        <div className="modal-overlay open">
          <div className="modal modal-lg">
            <div className="modal-header">
              <h3>Cautela {detalhe.numero}</h3>
              <button className="modal-close" onClick={()=>setDetalhe(null)}>×</button>
            </div>
            <div className="modal-body">
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>
                <div><span className="text-muted">{detalhe.cautela_tipo==='direto'?'Operário (responsável)':'Líder'}</span><br/><strong>{detalhe.lider_nome}</strong></div>
                <div><span className="text-muted">Status</span><br/><span className={`badge badge-${detalhe.status}`}>{STATUS_LABEL[detalhe.status]}</span></div>
                <div><span className="text-muted">Retirada</span><br/><strong>{fmtDT(detalhe.data_retirada)}</strong></div>
                <div><span className="text-muted">Valor total</span><br/><strong style={{color:'var(--success)'}}>{fmtBRL(detalhe.valor_total)}</strong></div>
              </div>
              {detalhe.ip_lider && <p className="text-muted" style={{fontSize:'.75rem',marginBottom:8}}>IP retirada: {detalhe.ip_lider}</p>}
              <div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap'}}>
                <button className="btn btn-outline btn-sm" onClick={()=>verTermo(detalhe.id,'comodato')} style={{display:'inline-flex',alignItems:'center',gap:5}}><Icon name="fileText" size={14}/> Termo de Comodato</button>
                <button className="btn btn-outline btn-sm" onClick={()=>verTermo(detalhe.id,'ciencia')} style={{display:'inline-flex',alignItems:'center',gap:5}}><Icon name="fileText" size={14}/> Termos de Ciência</button>
              </div>
              <hr className="divider" />
              <p className="fw-bold" style={{marginBottom:8}}>Itens da cautela</p>
              <div className="items-list">
                {detalhe.itens.map(i=>(
                  <div key={i.id} className="item-row">
                    <span>{i.ferramenta_nome}{i.codigo && <span className="text-muted"> ({i.codigo})</span>}</span>
                    <span><strong>{i.quantidade}x</strong></span>
                    <span style={{color:'var(--success)',fontSize:'.82rem'}}>{fmtBRL(i.valor_unitario||0)}</span>
                    <span style={{fontWeight:600}}>{fmtBRL(i.valor_item||0)}</span>
                  </div>
                ))}
              </div>
              {(detalhe.entregas||[]).length > 0 && (
                <>
                  <hr className="divider" />
                  <p className="fw-bold" style={{marginBottom:8}}>Entregas a operários</p>
                  {detalhe.entregas.map(e=>(
                    <div key={e.id} style={{border:'1px solid var(--border)',borderRadius:8,padding:12,marginBottom:8}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}}>
                        <div>
                          <strong>{e.operario_nome}</strong>
                          <span className="text-muted" style={{marginLeft:8}}>{e.operario_cargo}</span>
                          <span className={`badge badge-${e.status}`} style={{marginLeft:8}}>{STATUS_LABEL[e.status]||e.status}</span>
                        </div>
                        <div className="gap-8">
                          {e.ip_operario && <span className="text-muted" style={{fontSize:'.75rem'}}>IP: {e.ip_operario}</span>}
                          {e.status === 'ativa' && isLider && (
                            <button className="btn btn-success btn-sm" onClick={()=>devolverEntrega(detalhe.id,e.id)} style={{display:'inline-flex',alignItems:'center',gap:5}}><Icon name="download" size={14}/> Devolver</button>
                          )}
                        </div>
                      </div>
                      {e.itens && e.itens.length > 0 && (
                        <div style={{marginTop:8,fontSize:'.82rem',color:'#6b7280'}}>
                          {e.itens.map(i=>`${i.ferramenta_nome} × ${i.quantidade}`).join(' · ')}
                        </div>
                      )}
                      {e.assinatura_operario && <img src={e.assinatura_operario} height={50} style={{marginTop:6,border:'1px solid var(--border)',borderRadius:4}} alt="assinatura" />}
                    </div>
                  ))}
                </>
              )}
              {detalhe.assinatura_lider && (
                <>
                  <hr className="divider" />
                  <p className="text-muted" style={{marginBottom:6}}>Assinatura do Líder (retirada)</p>
                  <img src={detalhe.assinatura_lider} className="sig-preview" height={70} alt="assinatura líder" />
                </>
              )}
            </div>
            <div className="modal-footer">
              {isLider && detalhe.status === 'ativa' && detalhe.lider_id === user.id && (
                <button className="btn btn-accent" onClick={()=>{setDetalhe(null);abrirEntrega(detalhe)}} style={{display:'inline-flex',alignItems:'center',gap:6}}><Icon name="send" size={14}/> Entregar a operário</button>
              )}
              {(isLider || isAlm) && detalhe.status === 'ativa' && (
                <button className="btn btn-success" onClick={()=>{setDetalhe(null);abrirDevolver(detalhe)}} style={{display:'inline-flex',alignItems:'center',gap:6}}><Icon name="download" size={14}/> Devolver cautela</button>
              )}
              {detalhe.status === 'devolvida' && detalhe.assinatura_devolucao && (
                <button className="btn btn-outline btn-sm" onClick={()=>verTermoDevolucao(detalhe.id)} style={{display:'inline-flex',alignItems:'center',gap:5}}><Icon name="fileText" size={14}/> Recibo Devolução</button>
              )}
              <button className="btn btn-ghost" onClick={()=>setDetalhe(null)}>Fechar</button>
            </div>
          </div>
        </div>
      )}

      {/* Modal entregar ao operário */}
      {entregaModal && (
        <div className="modal-overlay open">
          <div className="modal modal-md">
            <div className="modal-header">
              <h3>Entregar ao Operário — {entregaModal.numero}</h3>
              <button className="modal-close" onClick={()=>setEntregaModal(null)}>×</button>
            </div>
            <div className="modal-body">
              {authStep === 'form' && (
                <>
                  <div className="alert alert-info">O operário deve autenticar neste dispositivo para confirmar o recebimento.</div>
                  <div className="auth-device-box">
                    <h4 style={{display:'flex',alignItems:'center',gap:8}}><Icon name="lock" size={16}/> Autenticação do Operário</h4>
                    {authErr && <div className="alert alert-error" style={{display:'flex',alignItems:'center',gap:8}}><Icon name="alertTriangle" size={15}/> {authErr}</div>}
                    <div className="form-grid">
                      <div className="form-group"><label>Email do operário</label><input type="email" value={authEmail} onChange={e=>setAuthEmail(e.target.value)} placeholder="operario@email.com" /></div>
                      <div className="form-group"><label>Senha</label><input type="password" value={authSenha} onChange={e=>setAuthSenha(e.target.value)} placeholder="••••••••" /></div>
                    </div>
                    <div style={{marginTop:12,textAlign:'right'}}>
                      <button className="btn btn-primary" onClick={validarOperario}>Autenticar →</button>
                    </div>
                  </div>
                  <hr className="divider" />
                  <label style={{display:'block',marginBottom:6}}>Itens a entregar</label>
                  <ItemsEditor ferramentas={ferramentas} value={entregaItens} onChange={setEntregaItens} />
                </>
              )}
              {authStep === 'termo' && authUser && (
                <>
                  <div className="alert alert-success" style={{display:'flex',alignItems:'center',gap:8}}><Icon name="checkCircle" size={16}/> Autenticado como {authUser.nome}. Leia o Termo de Comodato e tome ciência das responsabilidades antes de assinar.</div>
                  <div style={{border:'2px solid var(--primary)',borderRadius:8,maxHeight:380,overflowY:'auto',padding:16,background:'#fafbfc',marginBottom:16,fontSize:'.82rem',lineHeight:1.6}}>
                    {termoHTML
                      ? <div dangerouslySetInnerHTML={{__html: termoHTML}} />
                      : <p style={{color:'var(--text-secondary)'}}>Carregando termo...</p>}
                  </div>
                  <div style={{textAlign:'right'}}>
                    <button className="btn btn-primary" onClick={()=>setAuthStep('sign')} style={{display:'inline-flex',alignItems:'center',gap:6}}>Li e concordo → Assinar <Icon name="signature" size={14}/></button>
                  </div>
                </>
              )}
              {authStep === 'sign' && authUser && (
                <>
                  <div className="alert alert-success" style={{display:'flex',alignItems:'center',gap:8}}><Icon name="checkCircle" size={16}/> Autenticado como {authUser.nome}. Confira os itens e assine o Termo de Ciência.</div>
                  <div style={{background:'rgba(46,125,107,.08)',border:'1px solid rgba(46,125,107,.35)',borderRadius:8,padding:12,marginBottom:16}}>
                    {entregaItens.map(i=>(
                      <div key={i.ferramenta_id} style={{display:'flex',justifyContent:'space-between',fontSize:'.85rem',marginBottom:4}}>
                        <span>{i.ferramenta_nome} × {i.quantidade}</span>
                        <span style={{color:'var(--success)',fontWeight:600}}>{fmtBRL((i.valor_unitario||0)*i.quantidade)}</span>
                      </div>
                    ))}
                  </div>
                  <div className="alert alert-warning" style={{display:'flex',alignItems:'center',gap:8}}><Icon name="alertTriangle" size={16}/> Ao assinar, {authUser.nome} confirma o recebimento e assume responsabilidade por estes itens.</div>
                  <SignaturePad label={`Assinatura de ${authUser.nome} (Operário)`} onConfirm={confirmarEntrega} onCancel={()=>setAuthStep('termo')} />
                </>
              )}
            </div>
          </div>
        </div>
      )}

      {/* Modal devolver cautela — exige auth + assinatura do líder */}
      {devModal && (
        <div className="modal-overlay open">
          <div className="modal modal-md">
            <div className="modal-header">
              <h3 style={{display:'flex',alignItems:'center',gap:8}}><Icon name="download" size={17}/> Devolver Cautela {devModal.numero}</h3>
              <button className="modal-close" onClick={()=>setDevModal(null)}>×</button>
            </div>
            <div className="modal-body">
              {devStep === 'form' && (
                <>
                  <div className="alert alert-warning" style={{display:'flex',alignItems:'center',gap:8}}><Icon name="alertTriangle" size={16}/> A devolução requer autenticação e assinatura do líder responsável para garantir o registro formal da entrega.</div>
                  <div className="form-group" style={{marginBottom:12}}>
                    <label>Observações (condição das ferramentas)</label>
                    <textarea value={devModal.obs||''} onChange={e=>setDevModal({...devModal,obs:e.target.value})} placeholder="Sem avarias, desgaste normal..." />
                  </div>
                  <div className="auth-device-box">
                    <h4 style={{display:'flex',alignItems:'center',gap:8}}><Icon name="lock" size={16}/> Autenticação do {devModal.cautela_tipo==='direto'?'Operário':'Líder'}: {devModal.lider_nome}</h4>
                    {devErr && <div className="alert alert-error" style={{display:'flex',alignItems:'center',gap:8}}><Icon name="alertTriangle" size={15}/> {devErr}</div>}
                    <div className="form-grid">
                      <div className="form-group"><label>Email</label><input type="email" value={devEmail} onChange={e=>setDevEmail(e.target.value)} placeholder={devModal.lider_email} /></div>
                      <div className="form-group"><label>Senha</label><input type="password" value={devSenha} onChange={e=>setDevSenha(e.target.value)} placeholder="••••••••" /></div>
                    </div>
                    <div style={{marginTop:12,textAlign:'right'}}>
                      <button className="btn btn-primary" onClick={validarLiderDev}>Autenticar →</button>
                    </div>
                  </div>
                </>
              )}
              {devStep === 'sign' && (
                <>
                  <div className="alert alert-success" style={{display:'flex',alignItems:'center',gap:8}}><Icon name="checkCircle" size={16}/> Autenticado. Ao assinar, {devModal.cautela_tipo==='direto'?'o operário confirma':'o líder confirma'} a devolução de todos os itens ao almoxarifado.</div>
                  {devModal.obs && <p className="text-muted" style={{marginBottom:8}}>Obs: {devModal.obs}</p>}
                  <SignaturePad label={`Assinatura de ${devModal.lider_nome} — Confirmo a devolução`} onConfirm={devolver} onCancel={()=>setDevStep('form')} />
                </>
              )}
            </div>
          </div>
        </div>
      )}
    </div>
  )
}

// ─── EMPRÉSTIMOS ──────────────────────────────────────────────────────────────
function EmprestimosPage({ user, addToast }) {
  const [lista, setLista] = useState([])
  const [lideres, setLideres] = useState([])
  const [ferramentas, setFerramentas] = useState([])
  const [modal, setModal] = useState(null)
  const [form, setForm] = useState({})
  const [itens, setItens] = useState([])
  const [buscaEmail, setBuscaEmail] = useState('')
  const [tomadorEncontrado, setTomadorEncontrado] = useState(null)
  const [buscando, setBuscando] = useState(false)
  const [sigModal, setSigModal] = useState(null)
  const [filtro, setFiltro] = useState('')

  const load = () => GET('/emprestimos').then(setLista).catch(()=>{})
  useEffect(() => {
    load()
    GET('/ferramentas').then(setFerramentas)
    if (user.role === 'operario') GET('/usuarios/lideres').then(setLideres)
  }, [])

  const buscarTomador = async () => {
    if (!buscaEmail) return
    setBuscando(true); setTomadorEncontrado(null)
    try {
      const u = await GET(`/usuarios/buscar?email=${encodeURIComponent(buscaEmail)}`)
      if (!u) addToast('Nenhum operário encontrado com este email.', 'warning')
      setTomadorEncontrado(u)
    } catch(e) { addToast(e.message, 'error') }
    setBuscando(false)
  }

  const solicitar = async () => {
    if (!tomadorEncontrado) { addToast('Busque e confirme o tomador.', 'error'); return }
    if (!form.lider_id) { addToast('Selecione o líder responsável.', 'error'); return }
    if (!itens.length) { addToast('Adicione ao menos um item.', 'error'); return }
    try {
      const r = await POST('/emprestimos', { tomador_email: buscaEmail, lider_id: form.lider_id, itens, obs: form.obs || '' })
      addToast(`Solicitação enviada. ${r.tomador_nome} receberá notificação.`, 'success')
      setModal(null); setBuscaEmail(''); setTomadorEncontrado(null); setItens([]); setForm({}); load()
    } catch(e) { addToast(e.message, 'error') }
  }

  const confirmar = async id => {
    try { await POST(`/emprestimos/${id}/confirmar`, {}); addToast('Confirmado!', 'success'); load() }
    catch(e) { addToast(e.message, 'error') }
  }
  const recusar = async id => {
    if (!confirm('Recusar este empréstimo?')) return
    try { await POST(`/emprestimos/${id}/recusar`, {}); addToast('Recusado.', 'success'); load() }
    catch(e) { addToast(e.message, 'error') }
  }
  const devolver = async id => {
    if (!confirm('Confirmar devolução?')) return
    try { await POST(`/emprestimos/${id}/devolver`, {}); addToast('Devolução registrada!', 'success'); load() }
    catch(e) { addToast(e.message, 'error') }
  }

  const avalLider = async sig => {
    try {
      await POST(`/emprestimos/${sigModal.id}/aval-lider`, { assinatura: sig })
      addToast('Empréstimo aprovado e ativo!', 'success')
      setSigModal(null); load()
    } catch(e) { addToast(e.message, 'error') }
  }

  const filtrados = lista.filter(e => !filtro || e.status === filtro)

  return (
    <div>
      <div className="topbar">
        <h2>Empréstimos entre Operários</h2>
        {user.role === 'operario' && <button className="btn btn-accent" onClick={()=>setModal('novo')}><Icon name="plus" size={14}/> Solicitar Empréstimo</button>}
      </div>

      <div className="card">
        <div className="card-body" style={{paddingBottom:0}}>
          <select value={filtro} onChange={e=>setFiltro(e.target.value)} style={{width:'auto',marginBottom:16}}>
            <option value="">Todos</option>
            <option value="aguardando_tomador">Aguard. confirmação</option>
            <option value="aguardando_lider">Aguard. aval líder</option>
            <option value="ativo">Ativos</option>
            <option value="devolvido">Devolvidos</option>
            <option value="recusado">Recusados</option>
          </select>
        </div>
        <div className="table-wrap"><table className="cards-mobile">
          <thead><tr><th>Solicitante</th><th>Tomador</th><th>Líder</th><th>Itens</th><th>Status</th><th>Ações</th></tr></thead>
          <tbody>
            {filtrados.map(e=>(
              <tr key={e.id}>
                <td data-label="Solicitante">{e.solicitante_nome}</td>
                <td data-label="Tomador">{e.tomador_nome}</td>
                <td data-label="Líder">{e.lider_nome||'—'}</td>
                <td data-label="Itens" style={{fontSize:'.82rem'}}>{e.itens.map(i=>`${i.ferramenta_nome} (${i.quantidade}x)`).join(', ')}</td>
                <td data-label="Status"><span className={`badge badge-${e.status}`}>{STATUS_LABEL[e.status]}</span></td>
                <td className="cell-actions"><div className="actions">
                  {e.status === 'aguardando_tomador' && user.id === e.tomador_id && <>
                    <button className="btn btn-success btn-sm" onClick={()=>confirmar(e.id)} style={{display:'inline-flex',alignItems:'center',gap:5}}><Icon name="check" size={14}/> Confirmar</button>
                    <button className="btn btn-danger btn-sm" onClick={()=>recusar(e.id)} style={{display:'inline-flex',alignItems:'center',gap:5}}><Icon name="x" size={14}/> Recusar</button>
                  </>}
                  {e.status === 'aguardando_lider' && user.id === e.lider_id && (
                    <button className="btn btn-accent btn-sm" onClick={()=>setSigModal(e)} style={{display:'inline-flex',alignItems:'center',gap:5}}><Icon name="signature" size={14}/> Assinar aval</button>
                  )}
                  {e.status === 'ativo' && (user.id === e.solicitante_id || user.id === e.tomador_id) && (
                    <button className="btn btn-success btn-sm" onClick={()=>devolver(e.id)} style={{display:'inline-flex',alignItems:'center',gap:5}}><Icon name="download" size={14}/> Devolver</button>
                  )}
                </div></td>
              </tr>
            ))}
            {!filtrados.length && <tr><td colSpan="6"><div className="empty"><div className="empty-icon"><Icon name="handshake" size={32}/></div><p>{filtro ? 'Nenhum empréstimo com esse status.' : 'Nenhum empréstimo registrado.'}</p>{!filtro && user.role==='operario' && <button className="btn btn-accent empty-cta" onClick={()=>setModal('novo')}><Icon name="plus" size={14}/> Solicitar empréstimo</button>}</div></td></tr>}
          </tbody>
        </table></div>
      </div>

      {/* Modal novo empréstimo */}
      {modal === 'novo' && (
        <div className="modal-overlay open">
          <div className="modal modal-lg">
            <div className="modal-header"><h3>Solicitar Empréstimo</h3><button className="modal-close" onClick={()=>setModal(null)}>×</button></div>
            <div className="modal-body">
              <div className="alert alert-info">O colega precisará confirmar no próprio login, e o líder selecionado assinará o aval.</div>
              <div className="auth-device-box">
                <h4 style={{display:'flex',alignItems:'center',gap:8}}><Icon name="search" size={16}/> Buscar Operário pelo Email</h4>
                <div style={{display:'flex',gap:8,marginBottom:8}}>
                  <input type="email" value={buscaEmail} onChange={e=>{setBuscaEmail(e.target.value);setTomadorEncontrado(null)}} placeholder="email.exato@do.colega.com" style={{flex:1}} />
                  <button className="btn btn-primary" onClick={buscarTomador} disabled={buscando}>{buscando?'...':'Buscar'}</button>
                </div>
                {tomadorEncontrado && (
                  <div style={{background:'#d1fae5',padding:10,borderRadius:8,fontSize:'.88rem',display:'flex',alignItems:'center',gap:8}}>
                    <Icon name="checkCircle" size={15}/> Encontrado: <strong>{tomadorEncontrado.nome}</strong> — {tomadorEncontrado.cargo||ROLE_LABEL[tomadorEncontrado.role]}
                  </div>
                )}
                {buscaEmail && !tomadorEncontrado && !buscando && (
                  <div style={{background:'#fee2e2',padding:10,borderRadius:8,fontSize:'.88rem'}}>Nenhum operário encontrado com este email.</div>
                )}
              </div>

              <button className="btn btn-ghost" onClick={()=>setModal(null)}>Cancelar</button>
              <button className="btn btn-accent" onClick={solicitar} disabled={!tomadorEncontrado||!itens.length} style={{display:'inline-flex',alignItems:'center',gap:6}}><Icon name="send" size={14}/> Enviar solicitação</button>

// ─── FERRAMENTAS ──────────────────────────────────────────────────────────────
function FerramentasPage({ user, addToast }) {
  const [lista, setLista] = useState([])
  const [openId, setOpenId] = useState(null)   // id da ferramenta aberta, 'new', ou null
  const [form, setForm] = useState({})
  const [busca, setBusca] = useState('')
  const [confirmDel, setConfirmDel] = useState(false)
  const isMaster = !!(user && user.is_master)
  const load = () => GET('/ferramentas').then(setLista)
  useEffect(() => { load() }, [])
  const abrirNovo = () => { setForm({quantidade_total:1}); setConfirmDel(false); setOpenId('new') }
  const toggle = f => {
    if (openId === f.id) { fechar(); return }
    setForm({...f}); setConfirmDel(false); setOpenId(f.id)
  }
  const fechar = () => { setOpenId(null); setConfirmDel(false) }
  const save = async () => {
    if (!form.nome) { addToast('Informe o nome.','error'); return }
    try {
      if (form.id) await PUT(`/ferramentas/${form.id}`, form)
      else await POST('/ferramentas', form)
      addToast(form.id ? 'Atualizada!' : 'Cadastrada!', 'success')
      fechar(); load()
    } catch(e) { addToast(e.message,'error') }
  }
  const del = async () => {
    try { await DEL(`/ferramentas/${form.id}`); addToast('Excluída!','success'); fechar(); load() }
    catch(e) { addToast(e.message,'error') }
  }
  const filtradas = lista.filter(f => !busca || f.nome.toLowerCase().includes(busca.toLowerCase()) || (f.codigo||'').toLowerCase().includes(busca.toLowerCase()))
  // Painel de edição/cadastro que abre embaixo do item (acordeão)
  const painel = () => {
    const temCodigo = !!(form.codigo && form.codigo.trim())
    const codigoLocked = !!(form.id && form.codigo && form.codigo.trim())
    return (
      <div className="tool-edit-panel">
        <div className="tep-head">
          <span className="tep-title">{form.id ? (form.codigo ? `Patrimônio ${form.codigo}` : 'Editar ferramenta') : 'Nova ferramenta'}</span>
          <button className="tep-close" onClick={fechar} aria-label="Fechar"><Icon name="x" size={16}/></button>
        </div>
        <div className="form-grid">
          <div className="form-group full"><label>Nome *</label><input value={form.nome||''} onChange={e=>setForm({...form,nome:e.target.value})} /></div>
          <div className="form-group">
            <label>Código / Patrimônio</label>
            <input value={form.codigo||''} onChange={e=>!codigoLocked&&setForm({...form,codigo:e.target.value})} placeholder="FUR-001" disabled={codigoLocked} style={codigoLocked?{background:'#EEF1F5',cursor:'not-allowed'}:{}} />
            {codigoLocked && <span style={{fontSize:'.72rem',color:'var(--text-secondary)',marginTop:2,display:'inline-flex',alignItems:'center',gap:4}}><Icon name="lock" size={11}/> Código de patrimônio não pode ser alterado</span>}
          </div>
          <div className="form-group"><label>Categoria</label><input value={form.categoria||''} onChange={e=>setForm({...form,categoria:e.target.value})} /></div>
          <div className="form-group">
            <label>Quantidade total {temCodigo && <span style={{color:'var(--text-secondary)',fontWeight:400,fontSize:'.75rem'}}>(item único — fixo em 1)</span>}</label>
            <input type="number" min="0" value={temCodigo ? 1 : (form.quantidade_total??0)} onChange={e=>!temCodigo&&setForm({...form,quantidade_total:Math.max(0,parseInt(e.target.value)||0)})} disabled={temCodigo} style={temCodigo?{background:'#EEF1F5',cursor:'not-allowed'}:{}} />
          </div>
          <div className="form-group full"><label>Valor unitário (R$)</label><input type="number" min="0" step="0.01" value={form.valor_unitario||''} onChange={e=>setForm({...form,valor_unitario:parseFloat(e.target.value)||0})} placeholder="0,00" /></div>
          <div className="form-group full"><label>Descrição</label><textarea value={form.descricao||''} onChange={e=>setForm({...form,descricao:e.target.value})} /></div>
        </div>
        <div className="tep-footer">
          {confirmDel ? (
            <div style={{display:'flex',alignItems:'center',gap:10,width:'100%',justifyContent:'space-between',flexWrap:'wrap'}}>
              <span style={{fontSize:'.85rem',color:'var(--danger)',fontWeight:600,display:'inline-flex',alignItems:'center',gap:6}}><Icon name="alertTriangle" size={15}/> Excluir esta ferramenta?</span>
              <div className="gap-8"><button className="btn btn-ghost btn-sm" onClick={()=>setConfirmDel(false)}>Não</button><button className="btn btn-danger btn-sm" onClick={del}>Sim, excluir</button></div>
            </div>
          ) : (<>
            <div>{isMaster && form.id && !temCodigo && <button className="btn btn-danger btn-sm" onClick={()=>setConfirmDel(true)}><Icon name="trash" size={14}/> Excluir</button>}</div>
            <div className="gap-8">
              <button className="btn btn-ghost btn-sm" onClick={fechar}>Cancelar</button>
              <button className="btn btn-primary btn-sm" onClick={save}><Icon name="check" size={14}/> Salvar</button>
            </div>
          </>)}
        </div>
      </div>
    )
  }
  return (
    <div style={{maxWidth:680,margin:'0 auto'}}>
      <div className="topbar"><h2>Ferramentas</h2><button className="btn btn-accent" onClick={abrirNovo}><Icon name="plus" size={14}/> Cadastrar</button></div>
      <div className="card">
        <div className="card-body" style={{paddingBottom:12}}>
          <input placeholder="Buscar por nome ou código..." value={busca} onChange={e=>setBusca(e.target.value)} />
        </div>
        {(filtradas.length || openId==='new') ? (
          <div className="tool-list">
            {openId==='new' && painel()}
            {filtradas.map(f=>(
              <React.Fragment key={f.id}>
                <button className={`tool-item ${openId===f.id?'open':''}`} onClick={()=>toggle(f)}>
                  <span className="ti-nome"><span className="nm">{f.nome}</span>{f.codigo && <span title="Item patrimonial único" style={{color:'var(--text-secondary)',display:'inline-flex',flexShrink:0}}><Icon name="lock" size={12}/></span>}</span>
                  <span className="ti-right"><span className="qtd-badge">{f.quantidade_total}</span><span className="ti-chevron"><Icon name="chevronRight" size={18}/></span></span>
                </button>
                {openId===f.id && painel()}
              </React.Fragment>
            ))}
          </div>
        ) : (
          <div className="empty"><div className="empty-icon"><Icon name="wrench" size={32}/></div><p>{busca ? 'Nenhuma ferramenta encontrada para essa busca.' : 'Nenhuma ferramenta cadastrada ainda.'}</p>{!busca && <button className="btn btn-accent empty-cta" onClick={abrirNovo}><Icon name="plus" size={14}/> Cadastrar ferramenta</button>}</div>
        )}
      </div>
    </div>
  )
}

function UsuariosPage({ addToast }) {

    if (!form.nome || !form.email) { addToast('Nome e email obrigatórios.','error'); return }

      if (form.id) await PUT(`/usuarios/${form.id}`, form)
