// ─── AUDITORIA ────────────────────────────────────────────────────────────────
function AuditoriaPage({ addToast }) {
  const [logs, setLogs] = useState([])
  const [busca, setBusca] = useState('')
  const [resetModal, setResetModal] = useState(false)
  const [resetConfirm, setResetConfirm] = useState('')
  const [resetSenha, setResetSenha] = useState('')
  const [resetLoading, setResetLoading] = useState(false)
  const [resetErr, setResetErr] = useState('')
  const [zerarQtdModal, setZerarQtdModal] = useState(false)
  const [zerarQtdLoading, setZerarQtdLoading] = useState(false)
  const [zerarQtdErr, setZerarQtdErr] = useState('')
  useEffect(() => { GET('/auditoria').then(setLogs) }, [])
  const ACAO_ICON = { LOGIN:'key', CRIAR_SOLICITACAO:'clipboard', SOLICITACAO_SEPARANDO:'package', SOLICITACAO_PRONTA:'checkCircle', CANCELAR_SOLICITACAO:'x', RETIRADA_CAUTELA:'signature', DEVOLVER_CAUTELA:'download', ENTREGA_OPERARIO:'send', DEVOLUCAO_ENTREGA:'download', SOLICITAR_EMPRESTIMO:'handshake', CONFIRMAR_EMPRESTIMO:'checkCircle', RECUSAR_EMPRESTIMO:'x', AVAL_LIDER_EMPRESTIMO:'signature', DEVOLVER_EMPRESTIMO:'download', CRIAR_FERRAMENTA:'wrench', EDITAR_FERRAMENTA:'edit', EXCLUIR_FERRAMENTA:'trash', CRIAR_USUARIO:'worker', EDITAR_USUARIO:'edit', CRIAR_BOLSA:'backpack', EDITAR_BOLSA:'edit', VER_TERMO:'fileText', RESET_TRANSACIONAL:'alertTriangle' }
  const filtrados = logs.filter(l => !busca || (l.usuario_nome||'').toLowerCase().includes(busca.toLowerCase()) || l.acao.toLowerCase().includes(busca.toLowerCase()))

  async function zerarQuantidades() {
    setZerarQtdLoading(true); setZerarQtdErr('')
    try {
      const r = await POST('/admin/zerar-quantidades', {})
      setZerarQtdModal(false)
      addToast(`Quantidades zeradas em ${r.alteradas} ferramenta(s). Atualize o estoque real.`, 'success')
    } catch(e) { setZerarQtdErr(e.message) }
    finally { setZerarQtdLoading(false) }
  }

  async function executarReset() {
    if (resetConfirm !== 'CONFIRMAR RESET') { setResetErr('Digite exatamente: CONFIRMAR RESET'); return }
    if (!resetSenha) { setResetErr('Informe a senha do gestor'); return }
    setResetLoading(true); setResetErr('')
    try {
      await POST('/admin/reset-transacional', { confirmacao: resetConfirm, senha_gestor: resetSenha })
      setResetModal(false); setResetConfirm(''); setResetSenha(''); setLogs([])
      addToast('Sistema zerado com sucesso. Pronto para uso real.', 'success')
    } catch(e) {
      setResetErr(e.message)
    } finally {
      setResetLoading(false)
    }
  }

  return (
    <div>
      <div className="topbar">
        <h2>Auditoria</h2>
        <button className="btn btn-ghost btn-sm" onClick={async ()=>{
          try {
            const res = await fetch('/api/admin/backup', { headers: { Authorization: `Bearer ${token.value}` } })
            if (!res.ok) { const d = await res.json(); alert(d.error || 'Erro ao baixar backup'); return }
            const blob = await res.blob()
            const url = URL.createObjectURL(blob)
            const a = document.createElement('a')
            a.href = url
            a.download = `cautela-backup-${new Date().toISOString().slice(0,10)}.db`
            a.click(); URL.revokeObjectURL(url)
          } catch(e) { alert('Erro: ' + e.message) }
        }} style={{display:'inline-flex',alignItems:'center',gap:6}}><Icon name="download" size={14}/> Baixar Backup</button>
        <button className="btn btn-ghost btn-sm" style={{borderColor:'var(--warning)',color:'var(--warning)',display:'inline-flex',alignItems:'center',gap:6}} onClick={()=>{setZerarQtdModal(true);setZerarQtdSenha('');setZerarQtdErr('')}}><Icon name="package" size={14}/> Zerar Quantidades</button>
        <button className="btn btn-danger btn-sm" onClick={()=>{setResetModal(true);setResetConfirm('');setResetErr('')}} style={{display:'inline-flex',alignItems:'center',gap:6}}><Icon name="alertTriangle" size={14}/> Zerar Dados de Teste</button>
      </div>

      {zerarQtdModal && (
        <div className="modal-overlay open">
          <div className="modal modal-sm">
            <div className="modal-header"><h3 style={{display:'flex',alignItems:'center',gap:8}}><Icon name="package" size={17}/> Zerar Quantidades</h3><button className="modal-close" onClick={()=>setZerarQtdModal(false)}>×</button></div>
            <div className="modal-body">
              <div className="alert alert-warning" style={{marginBottom:16}}>
                Vai setar <strong>quantidade = 0</strong> em todas as ferramentas <strong>sem código de patrimônio</strong>.<br/>
                Ferramentas patrimoniais (<Icon name="lock" size={11}/>) não serão afetadas.<br/>
                Após isso, edite cada ferramenta com o estoque real.
              </div>
              {zerarQtdErr && <div className="alert alert-error" style={{marginTop:10}}>{zerarQtdErr}</div>}
            </div>
            <div className="modal-footer">
              <button className="btn btn-ghost" onClick={()=>setZerarQtdModal(false)}>Cancelar</button>
              <button className="btn btn-danger" onClick={zerarQuantidades} disabled={zerarQtdLoading}>{zerarQtdLoading?'Zerando...':<span style={{display:'inline-flex',alignItems:'center',gap:6}}><Icon name="package" size={14}/> Confirmar</span>}</button>
            </div>
          </div>
        </div>
      )}

      {resetModal && (
        <div className="modal-overlay open">
          <div className="modal modal-sm">
            <div className="modal-header"><h3 style={{display:'flex',alignItems:'center',gap:8}}><Icon name="alertTriangle" size={17}/> Zerar Dados Transacionais</h3><button className="modal-close" onClick={()=>{setResetModal(false);setResetSenha('');setResetConfirm('')}}>×</button></div>
            <div className="modal-body">
              <div className="alert alert-error" style={{marginBottom:16}}>
                <strong>Ação irreversível.</strong> Serão apagados permanentemente:<br/>
                Todas as solicitações, cautelas, empréstimos e auditoria.<br/>
                <strong>Ferramentas e usuários serão mantidos.</strong>
              </div>
              <div className="form-group" style={{marginBottom:14}}>
                <label>Senha do Gestor</label>
                <input type="password" value={resetSenha} onChange={e=>setResetSenha(e.target.value)} placeholder="Senha exclusiva do gestor" />
              </div>
              <div className="form-group">
                <label>Digite exatamente para confirmar:</label>
                <p style={{fontFamily:'monospace',fontWeight:700,margin:'4px 0 8px',fontSize:'1rem',color:'var(--danger)'}}>CONFIRMAR RESET</p>
                <input value={resetConfirm} onChange={e=>setResetConfirm(e.target.value)} placeholder="CONFIRMAR RESET" />
              </div>
              {resetErr && <div className="alert alert-error" style={{marginTop:10}}>{resetErr}</div>}
            </div>
            <div className="modal-footer">
              <button className="btn btn-ghost" onClick={()=>setResetModal(false)}>Cancelar</button>
              <button className="btn btn-danger" onClick={executarReset} disabled={resetLoading}>{resetLoading?'Zerando...':<span style={{display:'inline-flex',alignItems:'center',gap:6}}><Icon name="alertTriangle" size={14}/> Confirmar Reset</span>}</button>
            </div>
          </div>
        </div>
      )}

      <div className="card">
        <div className="card-body" style={{paddingBottom:0}}>
          <input placeholder="Buscar..." value={busca} onChange={e=>setBusca(e.target.value)} style={{maxWidth:340,marginBottom:16}} />
        </div>
        <div className="table-wrap"><table className="cards-mobile">
          <thead><tr><th>Data/Hora</th><th>Usuário</th><th>Ação</th><th>Detalhe</th></tr></thead>
          <tbody>
            {filtrados.map(l=>(
              <tr key={l.id}>
                <td className="text-muted" data-label="Data/Hora" style={{fontSize:'.8rem',whiteSpace:'nowrap'}}>{(l.criado_em||'').replace('T',' ').slice(0,16)}</td>
                <td data-label="Usuário">{l.usuario_nome||'—'}{l.usuario_role&&<><br/><span className={`badge badge-${l.usuario_role}`} style={{fontSize:'.7rem'}}>{ROLE_LABEL[l.usuario_role]}</span></>}</td>
                <td data-label="Ação"><span style={{marginRight:6,display:'inline-flex',verticalAlign:'middle',color:'var(--text-secondary)'}}>{ACAO_ICON[l.acao] ? <Icon name={ACAO_ICON[l.acao]} size={14}/> : <Icon name="fileText" size={14}/>}</span>{l.acao}</td>
                <td className="text-muted" data-label="Detalhe" style={{fontSize:'.82rem',maxWidth:220}}>{l.detalhe ? (typeof l.detalhe==='string'&&l.detalhe.startsWith('{') ? JSON.stringify(JSON.parse(l.detalhe),null,0).slice(0,80) : l.detalhe) : '—'}</td>
              </tr>
            ))}
            {!filtrados.length && <tr><td colSpan="4"><div className="empty"><div className="empty-icon"><Icon name="history" size={32}/></div><p>Sem registros.</p></div></td></tr>}
          </tbody>
        </table></div>
      </div>
    </div>
  )
}

function Icon({ name, size=20 }) {
  const path = ICON_PATHS[name]
  if (!path) return null
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{flexShrink:0}}>
      {path}
    </svg>
  )
}

// ─── SIDEBAR ──────────────────────────────────────────────────────────────────
function Sidebar({ user, page, navigate, onLogout, notif }) {
  const alm = user.role === 'almoxarifado'
  const lider = user.role === 'lider'
  const items = [
    { id: 'dashboard', icon: 'dashboard', label: 'Painel', show: true },
    { id: 'solicitacoes', icon: 'clipboard', label: 'Solicitações', show: alm || lider, badge: alm ? ((notif.solicitacoes_novas||0)+(notif.solicitacoes_prontas||0)) : (notif.sol_prontas||0) },
    { id: 'nova-solicitacao', icon: 'plus', label: 'Nova Solicitação', show: lider },
    { id: 'cautelas', icon: 'package', label: 'Cautelas', show: alm || lider || user.role==='operario' },
    { id: 'emprestimos', icon: 'exchange', label: 'Empréstimos', show: true, badge: user.role==='operario'?(notif.emprestimos_aguardando_confirmacao||0):(lider?(notif.emprestimos_aguardando_aval||0):0) },
    { id: 'ferramentas', icon: 'wrench', label: 'Ferramentas', show: alm },
    { id: 'bolsas', icon: 'backpack', label: 'Bolsas / Kits', show: alm },
    { id: 'usuarios', icon: 'users', label: 'Usuários', show: alm },
    { id: 'auditoria', icon: 'history', label: 'Auditoria', show: alm },
  ].filter(i => i.show)
  return (
    <div className="sidebar">
      <div className="sidebar-header">
        <div className="sidebar-logo">
          {empresaInfo.logoUrl && <img src={empresaInfo.logoUrl} alt={empresaInfo.nome} style={{maxWidth:36,maxHeight:36,borderRadius:6}} />}
          <div><h2>Cautelix</h2><p>{empresaInfo.nome}</p></div>
        </div>
      </div>
      <div className="sidebar-user">
        <div className="name">{user.nome}</div>
        <div className="role">{user.is_master ? 'Administrador Master' : (ROLE_LABEL[user.role] + ((user.cargo && user.cargo.trim().toLowerCase() !== ROLE_LABEL[user.role].toLowerCase()) ? ` — ${user.cargo}` : ''))}</div>
        <div style={{fontSize:'.7rem',color:'rgba(255,255,255,.45)',marginTop:4,wordBreak:'break-all'}}>{user.email}</div>
      </div>
      <nav className="sidebar-nav">
        {items.map(item=>(
          <button key={item.id} className={`nav-item ${page===item.id?'active':''}`} onClick={()=>navigate(item.id)}>
            <span className="nav-icon"><Icon name={item.icon} size={18}/></span>
            {item.label}
            {item.badge > 0 && <span className="nav-badge">{item.badge}</span>}
          </button>
        ))}
      </nav>
      <div className="sidebar-footer"><button className="btn-logout" onClick={onLogout}><Icon name="logout" size={16}/> Sair</button></div>
    </div>
  )
}

// ─── BOTTOM NAV ───────────────────────────────────────────────────────────────
function BottomNav({ user, page, navigate, notif }) {
  const alm = user.role === 'almoxarifado'
  const lider = user.role === 'lider'
  const op = user.role === 'operario'
  const items = [
    { id: 'dashboard', icon: 'dashboard', label: 'Painel' },
    { id: 'solicitacoes', icon: 'clipboard', label: alm?'Fila':'Pedidos', badge: alm?((notif.solicitacoes_novas||0)+(notif.solicitacoes_prontas||0)):(notif.sol_prontas||0), show: alm||lider },
    { id: 'cautelas', icon: 'package', label: 'Cautelas', show: alm||lider||op },
    { id: 'emprestimos', icon: 'exchange', label: 'Empréstimos', badge: op?(notif.emprestimos_aguardando_confirmacao||0):(lider?(notif.emprestimos_aguardando_aval||0):0) },
    { id: 'ferramentas', icon: 'wrench', label: 'Ferramentas', show: alm },
  ].filter(i => i.show !== false).slice(0,5)
  return (
    <nav className="bottom-nav">
      <div className="bottom-nav-inner">
        {items.map(item=>(
          <button key={item.id} className={`bottom-nav-btn ${page===item.id?'active':''}`} onClick={()=>navigate(item.id)}>
            <span className="bn-icon"><Icon name={item.icon} size={20}/></span>
            <span className="bn-label">{item.label}</span>
            {item.badge > 0 && <span className="bn-badge">{item.badge}</span>}
          </button>
        ))}
      </div>
    </nav>
  )
}

// ─── APP ROOT ─────────────────────────────────────────────────────────────────
function App() {
  const [user, setUser] = useState(null)
  const [page, setPage] = useState('dashboard')
  const [toasts, setToasts] = useState([])
  const [checking, setChecking] = useState(true)
  const [notif, setNotif] = useState({})

  const addToast = useCallback((msg, type='success') => {
    const id = Date.now()
    setToasts(t => [...t, {id, msg, type}])
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3500)
  }, [])

  useEffect(() => {
    if (token.value) {
      GET('/auth/me').then(u => { setUser(u); setChecking(false) })
        .catch(() => { token.value = null; localStorage.removeItem('cf_token'); setChecking(false) })
    } else setChecking(false)
  }, [])

  useEffect(() => {
    if (!user) return
    let prev = {}
    const load = () => GET('/notificacoes').then(n => {
      // Toast para líder quando solicitação fica pronta
      if (user.role === 'lider') {
        const curr = n.sol_prontas || 0
        const ante = prev.sol_prontas || 0
        if (curr > 0 && curr !== ante) addToast(`${curr} solicitação(ões) pronta(s) para retirada!`, 'warning')
      }
      // Toast para operário quando tem empréstimo aguardando confirmação
      if (user.role === 'operario') {
        const curr = n.emprestimos_aguardando_confirmacao || 0
        const ante = prev.emprestimos_aguardando_confirmacao || 0
        if (curr > ante) addToast(`Você tem ${curr} empréstimo(s) aguardando sua confirmação`, 'warning')
      }
      prev = n
      setNotif(n)
    }).catch(()=>{})
    load()
    const interval = setInterval(load, 30000)
    return () => clearInterval(interval)
  }, [user])

  const navigate = p => setPage(p)
  const logout = () => { token.value = null; localStorage.removeItem('cf_token'); setUser(null); setPage('dashboard') }

  if (checking) return <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',fontSize:'1.2rem',color:'#6b7280'}}>Carregando...</div>
  if (!user) return <LoginPage onLogin={u=>{ setUser(u); setPage('dashboard') }} />
  if (user.primeiro_acesso) return <PrimeiroAcessoPage user={user} onConcluido={u=>setUser(u)} />

  const props = { user, navigate, addToast }
  const renderPage = () => {
    if (page === 'dashboard') return <Dashboard {...props} />
    if (page === 'solicitacoes') return <SolicitacoesPage {...props} />
    if (page === 'nova-solicitacao') return <NovaSolicitacaoPage {...props} />
    if (page === 'cautelas') return <CautelasPage {...props} />
    if (page === 'emprestimos') return <EmprestimosPage {...props} />
    if (page === 'ferramentas') return <FerramentasPage {...props} />
    if (page === 'bolsas') return <BolsasPage {...props} />
    if (page === 'usuarios') return <UsuariosPage {...props} />
    if (page === 'auditoria') return <AuditoriaPage {...props} />
    return <div style={{padding:24}}>Página não encontrada.</div>
  }

  return (
    <div className="layout">
      <Sidebar user={user} page={page} navigate={navigate} onLogout={logout} notif={notif} />
      <div className="main-content">{renderPage()}</div>
      <BottomNav user={user} page={page} navigate={navigate} notif={notif} />
      <Toast toasts={toasts} />
    </div>
  )
}

function startApp() {
  ReactDOM.createRoot(document.getElementById('root')).render(<App />)
}
// Busca o nome real da empresa antes de renderizar (usado em termos legais e avisos);
// se falhar, segue com o valor genérico padrão em vez de travar o carregamento.
fetch('/api/empresa').then(r => r.json()).then(e => {
  if (e && e.nome) empresaInfo.nome = e.nome
  if (e && e.razaoSocial) empresaInfo.razaoSocial = e.razaoSocial
  if (e && e.logoUrl) empresaInfo.logoUrl = e.logoUrl
}).catch(() => {}).finally(startApp)
</script>

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .then(r => console.log('SW:', r.scope))
      .catch(e => console.warn('SW falhou:', e))
  })
}
</script>
</body>
